<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page In Progress</title>

  <!-- Scripts -->
  <script src="/js/mainPageCloak.js"></script>
  <script src="/js/openGame.js"></script>
  <script src="/js/panicKey.js"></script>
  <script src="/js/style.js"></script>
  <script src="/js/cursor.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css" />

  <style>
    body.strategies-page {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .bg-effects {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05), transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(255,255,255,0.03), transparent 40%);
      z-index: 0;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid #30363d;
      border-radius: 14px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      z-index: 1;
      animation: fadeIn 0.6s ease;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .subtext {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 25px;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #58a6ff;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    .btn {
      padding: 10px 25px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #238636;
      color: #fff;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .btn:hover {
      background: #2ea043;
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(46,160,67,0.5);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 500px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body class="strategies-page">
  <div class="bg-effects"></div>

  <div class="container">
    <div class="loader"></div>

    <h1>Page Is Currently Progress</h1>
    <div class="subtext">
      This page is currently being worked on. Check back later.
    </div>

    <button id="backBtn" class="btn">Go Back</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const backLink = params.get("back") || "https://jimmyqrg.github.io/?page=extend";

    document.getElementById("backBtn").onclick = () => {
      window.location.href = backLink;
    };
  </script>
</body>
</html>
