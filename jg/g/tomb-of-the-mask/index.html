<script>
/* jqrg-loader.js
 * Universal game loading screen. Each game page includes this script
 * (non-deferred) in <head> so it can intercept engine globals before they
 * run. Games with custom download loops (Unity + zip, etc.) should call
 * `window.JqrgLoader.setBytes(loaded, total)` so the size readout shows a
 * real total instead of a placeholder.
 *
 *   1. Paints a black overlay with a progress bar and size counter.
 *   2. Hooks every game engine we ship (Unity, Godot, Ruffle, EmulatorJS,
 *      Construct, GameMaker, plain HTML/JS) so it can drive that progress
 *      bar with real numbers when possible. PerformanceObserver is the
 *      universal fallback - it tracks transferSize for every resource the
 *      page downloads and gives us byte counts even when the engine refuses
 *      to talk to us.

 *      the branded splash: fade in /background.png, scale + fade in the
 *      banner image (default /banner.png, or <meta name="jqrg-loader-banner-url"
 *      content="..."> when set *before* this script), fade out, remove overlay.
 *

 * its listeners and DOM after the splash so it does not leak into games.
 */

  // Place in <head> *before* this script: <meta name="jqrg-loader-banner-url" content="/path/logo.png">
  // Absolute paths are recommended when the page uses <base href>.
  function getBannerUrlOverride() {
    try {
      var m = document.querySelector('meta[name="jqrg-loader-banner-url"]');
      if (!m || !m.content) return null;
      var raw = String(m.content).trim();
      if (!raw) return null;
      if (/^https?:\/\//i.test(raw) || raw.charAt(0) === '/') return raw;

      } catch (_) {
        return raw;

    return null;

  // Optional per-page splash background override.
  // <meta name="jqrg-loader-black-bg" content="1"> keeps splash background black
  // instead of fading in /background.png.

    try {

  // visually continuous instead of a fresh scale bump kicking in mid-fade.

  // the right-hand side as the same "--.--" placeholder used at boot.
  // This prevents the right value from mirroring the left value (which
  // is what made the readout look like "5MB / 5MB" updating in lockstep).

    return (loaded || 0) + ' / --';
  }

    return (b / (1024 * 1024)).toFixed(2) + 'MB';
  }
  function formatKB(b) {
    if (!b || b < 0) return '--KB';
    return Math.round(b / 1024) + 'KB';
  }
  function formatB(b) {
    if (!b || b < 0) return '--B';
    return Math.round(b) + 'B';
  }

<script>
(function(){
  var startX,startY,startT;
  var SWIPE_MIN=20;
  var SWIPE_MAX_MS=500;
  var KEY_MAP={up:38,down:40,left:37,right:39};

  function fireKey(code,type){
    var e=new KeyboardEvent(type,{keyCode:code,which:code,bubbles:true,cancelable:true});
    document.dispatchEvent(e);
    var c=document.querySelector('#gameContainer canvas');
    if(c) c.dispatchEvent(new KeyboardEvent(type,{keyCode:code,which:code,bubbles:true,cancelable:true}));
  }

  document.addEventListener('touchstart',function(e){
    e.preventDefault();
    e.stopImmediatePropagation();
    var t=e.touches[0];

    startY=t.clientY;

  document.addEventListener('touchmove',function(e){
    e.preventDefault();
    e.stopImmediatePropagation();
  },{passive:false,capture:true});

  document.addEventListener('touchend',function(e){
    e.preventDefault();
    e.stopImmediatePropagation();
    if(startX===undefined) return;
    var t=e.changedTouches[0];
    var dx=t.clientX-startX;
    var dy=t.clientY-startY;

  document.body.style.touchAction='none';
  document.body.style.position='fixed';
  document.body.style.width='100%';
  document.body.style.height='100%';
