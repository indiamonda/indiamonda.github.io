<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>403 - Access Denied</title>

  <!-- Scripts -->
  <script src="/js/mainPageCloak.js"></script>
  <script src="/js/openGame.js"></script>
  <script src="/js/panicKey.js"></script>
  <script src="/js/style.js"></script>
  <script src="/js/cursor.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #111, #000);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 120px;
      margin: 0;
      color: #ff3c3c;
      text-shadow: 0 0 20px rgba(255, 60, 60, 0.6);
    }

    h2 {
      margin-top: -10px;
      font-weight: 400;
      color: #ccc;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff3c3c;
      color: #fff;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #ff1f1f;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 60, 60, 0.5);
    }

    /* Background effect */
    .bg-effects {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        45deg,
        rgba(255, 0, 0, 0.05),
        rgba(255, 0, 0, 0.05) 10px,
        transparent 10px,
        transparent 20px
      );
      animation: moveBg 5s linear infinite;
      z-index: 1;
    }

    @keyframes moveBg {
      from { background-position: 0 0; }
      to { background-position: 200px 200px; }
    }
  </style>
</head>

<body class="strategies-page">
  <div class="bg-effects"></div>

  <div class="container">
    <h1>403</h1>
    <h2>Access Denied</h2>
    <button id="backBtn" class="btn">Go Back</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const backLink = params.get("back") || "https://jimmyqrg.github.io/?page=extend";

    document.getElementById("backBtn").onclick = () => {
      window.location.href = backLink;
    };
  </script>
</body>
</html>
