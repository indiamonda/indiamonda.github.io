    seenResources = null;
  }

  // ---------- Tip footer ----------------------------------------------------
  // Pull /js/jqrg-loader-lines.js once per overlay (cached after the
  // first game) and start cycling. window.__JqrgLoaderLines is set as a
  // side effect of that script. If the file errors out we just stay
  // silent — the loader still works.
  function loadTipLines() {
    if (disposed || !tipEl) return;
    if (window.__JqrgLoaderLines && window.__JqrgLoaderLines.length) {
      primeTips(window.__JqrgLoaderLines);
      return;
    }
    try {
      var s = document.createElement('script');
      s.src = '/js/jqrg-loader-lines.js';
      s.async = true;
      s.onload = function () {
        if (disposed) return;
        if (window.__JqrgLoaderLines && window.__JqrgLoaderLines.length) {
          primeTips(window.__JqrgLoaderLines);
        }
      };
      (document.head || document.documentElement).appendChild(s);
    } catch (_) {}
  }

  // Fisher-Yates shuffle so each load shows a different sequence; first
  // line appears immediately, subsequent ones rotate every TIP_HOLD_MS.
  function primeTips(lines) {
    if (disposed || !tipEl) return;
    var arr = lines.slice();
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    tipLines = arr;
    tipIndex = 0;
    showCurrentTip();
  }

  // Set text, fade in, hold, fade out, advance, repeat. Two timers chain
  // hold -> fade-out so cleanup() can cancel either half cleanly.
  function showCurrentTip() {
    if (disposed || !tipEl || !tipLines || !tipLines.length) return;
    var line = tipLines[tipIndex % tipLines.length];
    tipEl.textContent = line;
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (tipEl) tipEl.classList.add('jqrg-tip-show');
      });
    });
    tipTimer = setTimeout(function () {
      tipTimer = null;
      if (disposed || !tipEl) return;
      tipEl.classList.remove('jqrg-tip-show');
      tipTransitionTimer = setTimeout(function () {
        tipTransitionTimer = null;
        if (disposed) return;
        tipIndex++;
        showCurrentTip();
      }, 380); // a hair longer than the .35s opacity transition
    }, 4500);
  }

  // ---------- Polling fallbacks ---------------------------------------------
  // Hoisted top-level `function createUnityInstance(...)` declarations replace
  // our accessor trap with a data property during script evaluation. Continuous
  // polling re-wraps whatever the engine ended up exposing. The wrap helpers
  // are idempotent thanks to __jqrgWrapped.
  function rewrapEngineGlobals() {
    var sawEngine = false;
    try {
      if (window.UnityLoader && !window.UnityLoader.__jqrgWrapped) {
        wrapUnityLoader(window.UnityLoader);
      }
      if (window.UnityLoader) sawEngine = true;
    } catch (_) {}
    try {
      if (typeof window.createUnityInstance === 'function') {
        if (!window.createUnityInstance.__jqrgWrapped) {
          window.createUnityInstance = wrapCreateUnityInstance(window.createUnityInstance);
        }
        sawEngine = true;
      }
    } catch (_) {}
    try {
      if (window.Engine) {
        if (!window.Engine.__jqrgWrapped) wrapGodotEngine(window.Engine);
        sawEngine = true;
      }
    } catch (_) {}
    if (sawEngine && !firstEngineGlobalSeenTime) {
      firstEngineGlobalSeenTime = Date.now();
    }
  }

  function startPolling() {
    pollTimer = setInterval(function () {
      if (completed) {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        return;
      }
      rewrapEngineGlobals();
    }, POLL_INTERVAL_MS);
  }

  // Script-tag load events fire as soon as a script finishes evaluating. That
  // is the earliest moment we can re-wrap any engine globals it just defined,
  // *before* the engine code itself uses them. Capture phase catches scripts
  // injected anywhere in the document.
  function startScriptLoadHook() {
    if (typeof document === 'undefined' || !document.addEventListener) return;
    document.addEventListener('load', function (e) {
      if (completed) return;
      var t = e && e.target;
      if (!t || t.tagName !== 'SCRIPT') return;
      rewrapEngineGlobals();
    }, true);
  }

  // ---------- Bootstrap ------------------------------------------------------
  // Hook the engines synchronously - this is why the script must NOT defer.
  hookUnityLoader();
  hookCreateUnityInstance();
  hookGodot();
  hookRuffle();
  hookEmulatorJS();
  hookGameMaker();
  hookConstruct();
  hookNetwork();
  startResourceObserver();
  startPolling();
  startScriptLoadHook();
  // Kick off the splash image preload immediately so by the time loading
  // completes the images are warm and the black-screen gap is sub-frame.
  preloadSplashAssets();

  // Build the overlay as soon as we have any DOM to attach to. The loader
  // script runs in <head>, so document.body usually does not exist yet; we
  // mount on DOMContentLoaded in that case. If the body somehow already
  // exists (script tag placed at the bottom, dynamic injection, etc.) we
  // mount synchronously so we paint over any native loading UI immediately.
  function mountWhenReady() {
    if (overlay || disposed) return;
    if (document.body) {
      try { ensureOverlay(); } catch (_) {}
      return;
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', mountWhenReady, { once: true });
    } else {
      // Edge case: readyState is interactive/complete but body is gone (very
      // unusual). Bail to a microtask to give the browser a chance to settle.
      setTimeout(mountWhenReady, 0);
    }
  }
  mountWhenReady();

  // window.load is the universal completion signal. We give engine-specific
  // hooks a small grace period after load to fire their own callbacks. Some
  // pages drive their own fetch loops *after* load (e.g. Hollow Knight downloads
  // its .data/.wasm in an IIFE then injects the Unity loader script), so we
  // defer completion until activity has actually settled.
  function onWindowLoad() {
    if (completed) return;
    loadFiredTime = Date.now();
    if (hasEngineProgress && engineProgress < 0.999) {
      // Engine actively reporting progress - it'll drive completion at 100%.
      // No need to schedule anything; setEngineProgress handles it.
      return;
    }
    if (hasEngineProgress) {
      // Engine already reported 100% (rare but possible) - finish promptly.
      scheduleComplete(150);
      return;
    }
    // No engine progress yet. Watch resource activity to decide when done.
    deferredCompleteCheck();
  }
  if (document.readyState === 'complete') {
    setTimeout(onWindowLoad, 0);
  } else {
    window.addEventListener('load', onWindowLoad);
  }

  // Hard cap: if the game never reports done, force-complete after the max.
  maxLoadingTimer = setTimeout(function () {
    if (!completed) complete();
  }, MAX_LOADING_MS);

  // Public API for niche cases (e.g. the bloxd.io wrapper) that need to
  // drive the splash manually instead of waiting on engine signals.
  window.JqrgLoader = {
    setProgress: function (p) { setEngineProgress(p); },
    setBytes: function (loaded, total) {
      manualBytesMode = true;
      setBytesLoaded(loaded);
      if (total != null) setBytesTotal(total);
    },
    complete: function () { complete(); },
    isComplete: function () { return completed; },
    // Total time (ms) the post-load splash sequence takes to finish, from
    // complete()/auto-complete to the overlay being torn down. Kept on the
    // public API so wrappers (bloxd.io etc.) can schedule any post-splash
    // work without having to duplicate the constants below.
    splashDurationMs: BG_FADE_IN_MS + BANNER_ANIM_MS + BANNER_FADE_OUT_MS + BG_FADE_OUT_MS,
  };
})();

</script>

<script>
/* ===========================
   FULL, STANDALONE index.html
   - Keeps UI exactly as overlay above
   - Fixes 'black after start' bug
   - Integrates settings via localStorage key 'briddSettings'
   - Alerts if settings.html missing when trying to open it
   =========================== */

/* ---------- Utilities ---------- */
function showToast(msg, ms=1200){
  const d = document.getElementById('debugToast');
  d.innerText = msg;
  d.style.display = 'block';
  clearTimeout(d._timer);
  d._timer = setTimeout(()=> d.style.display = 'none', ms);
}

/* ---------- Canvas & resizing ---------- */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ---------- Constants & state ---------- */
const BLOCK_SIZE = 50;
const JUMP_SPEED = -15;
const GRAVITY = 0.7;

/* Player object blueprint */
let player = {
  x: 100, y: 0, width: 50, height: 50, vy: 0, speed: 11,
  color: "#0ff", hitboxScale: 0.6, jumpsLeft: 2, onGround:false, visible:true,
  horizMultiplier:1, vertMultiplier:1, accountEmail: "player@example.com"
};

/* world arrays */
let platforms = [], spikes = [], gems = [], particles = [], crashPieces = [], trail = [], lines = [];

/* gameplay */
let keys = {}, score = 0, bestScore = localStorage.getItem("bestScore") ? parseInt(localStorage.getItem("bestScore")) : 0;
let gameRunning = false;
let lastTime = performance.now();
let cameraX = 0, cameraY = 0;

/* color cycling */
let baseColors = [
  {r:255,g:0,b:0},{r:255,g:153,b:0},{r:255,g:255,b:0},
  {r:0,g:255,b:0},{r:0,g:255,b:255},{r:0,g:0,b:255},{r:153,g:0,b:255}
];
let colorIndex = 0, nextColor = baseColors[1], platformColor = {...baseColors[0]}, colorLerp = 0, globalTime = 0;

/* misc */
let testMode = false, gemEveryBlock = false, account = "player", oldAccount = null;
let cheats = { float:false, invincible:false, infiniteJump:false };

/* ---------- Settings loading from localStorage ---------- */
const LS_KEY = "briddSettings";

const defaultSettings = {
  maxFPS: 0, // 0 => unlimited
  qualityPreset: "Extreme+",
  quality: {
    jumpEffect: 64,
    walkEffect: 64,
    dieEffect: 64,
    horizontalLines: 64,
    trail: 64,
    blockTexture: 100,
    glow: 100
  }
};

const qualityPresets = {
  "Potato":      { blockTexture:0, jumpEffect:0, walkEffect:0, dieEffect:0, horizontalLines:0, trail:0, glow:0, lines:false },
  "Low":         { blockTexture:0, jumpEffect:5, walkEffect:0, dieEffect:0, horizontalLines:0, trail:0, glow:0, lines:false },
  "Medium":      { blockTexture:1, jumpEffect:10, walkEffect:0, dieEffect:10, horizontalLines:0, trail:0, glow:0, lines:false },
  "Medium+":     { blockTexture:1, jumpEffect:15, walkEffect:15, dieEffect:15, horizontalLines:0, trail:0, glow:0, lines:false },
  "High":        { blockTexture:1, jumpEffect:15, walkEffect:15, dieEffect:15, horizontalLines:15, trail:0, glow:0, lines:true },
  "High+":       { blockTexture:1, jumpEffect:33, walkEffect:33, dieEffect:33, horizontalLines:33, trail:0, glow:0, lines:true },
  "Extreme":     { blockTexture:1, jumpEffect:60, walkEffect:60, dieEffect:60, horizontalLines:60, trail:0, glow:0, lines:true },
  "Extreme+":    { blockTexture:1, jumpEffect:64, walkEffect:64, dieEffect:64, horizontalLines:64, trail:1, glow:1, lines:true },
  "Ultra":       { blockTexture:1, jumpEffect:100, walkEffect:100, dieEffect:100, horizontalLines:100, trail:0, glow:1, lines:true },
  "Ultra+":      { blockTexture:1, jumpEffect:120, walkEffect:120, dieEffect:120, horizontalLines:120, trail:1, glow:1, lines:true },
  "Glow Highest":{ blockTexture:1, jumpEffect:200, walkEffect:200, dieEffect:200, horizontalLines:200, trail:1, glow:1.5, lines:true }
};

function readSettings(){
  try {
    let raw = localStorage.getItem(LS_KEY);
    if(!raw) return JSON.parse(JSON.stringify(defaultSettings));
    const parsed = JSON.parse(raw);
    const merged = JSON.parse(JSON.stringify(defaultSettings));
    if(parsed.maxFPS !== undefined) merged.maxFPS = parsed.maxFPS;
    if(parsed.qualityPreset) merged.qualityPreset = parsed.qualityPreset;
    if(parsed.quality) merged.quality = {...merged.quality, ...parsed.quality};
    return merged;
  } catch(e) {
    console.warn("Failed to read settings:", e);
    return JSON.parse(JSON.stringify(defaultSettings));
  }
}
function writeSettings(s){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e){ console.warn("Failed to write settings:", e); }
}

/* runtime settings object derived from storage */
let settings = readSettings();

let runtime = {
  minFrameTime: 0,
  effects: {
    jumpEffectMul: 1,
    walkEffectMul: 1,
    dieEffectMul: 1,
    horizontalLinesMul: 1,
    trailMul: 1,
    blockTextureMul: 1
  },
  glowEnabled: true,
  linesEnabled: true,
  trailEnabled: true
};

function applySettings(s){
  settings = s || settings;
  // FPS
  if(!settings.maxFPS || settings.maxFPS === 0 || settings.maxFPS === "Unlimited"){
    runtime.minFrameTime = 0;
    settings.maxFPS = 0;
  } else {
    runtime.minFrameTime = 1000 / Number(settings.maxFPS);
  }

  const preset = qualityPresets[settings.qualityPreset] || {};
  const pct = (v) => (Number(v) || 0) / 100;

  runtime.effects.blockTextureMul = pct(settings.quality.blockTexture) || (preset.blockTexture ? 1 : 0);
  runtime.effects.jumpEffectMul = pct(settings.quality.jumpEffect) || (preset.jumpEffect ? preset.jumpEffect/100 : 0);
  runtime.effects.walkEffectMul = pct(settings.quality.walkEffect) || (preset.walkEffect ? preset.walkEffect/100 : 0);
  runtime.effects.dieEffectMul = pct(settings.quality.dieEffect) || (preset.dieEffect ? preset.dieEffect/100 : 0);
  runtime.effects.horizontalLinesMul = pct(settings.quality.horizontalLines) || (preset.horizontalLines ? preset.horizontalLines/100 : 0);
  runtime.effects.trailMul = pct(settings.quality.trail) || (preset.trail ? preset.trail/100 : 0);

  runtime.glowEnabled = (settings.quality && settings.quality.glow !== undefined) ? (settings.quality.glow > 0) : (preset.glow !== undefined ? !!preset.glow : true);
  runtime.linesEnabled = preset.lines !== undefined ? preset.lines : true;
  runtime.trailEnabled = (settings.quality && settings.quality.trail !== undefined) ? settings.quality.trail > 0 : !!preset.trail;

  // save canonical
  writeSettings(settings);

  // update HUD label
  const fpsLabel = document.getElementById('fpsLabel');
  fpsLabel.innerText = settings.maxFPS === 0 ? `FPS: Unlimited — Quality: ${settings.qualityPreset}` : `FPS: ${settings.maxFPS} — Quality: ${settings.qualityPreset}`;
}

/* initial apply */
applySettings(settings);

/* ---------- Utility drawing helpers ---------- */
function lerpColor(c1,c2,t){ return { r: c1.r + (c2.r - c1.r)*t, g: c1.g + (c2.g - c1.g)*t, b: c1.b + (c2.b - c1.b)*t }; }

/* ---------- World initialization & reset (fix black-screen issue) ---------- */
let lastPlatformX = 0, lastPlatformY = 0;

function resetWorld(){
  // clear arrays
  platforms = [];
  spikes = [];
  gems = [];
  particles = [];
  crashPieces = [];
  trail = [];
  lines = [];

  // reset player
  player.x = 100;
  player.y = canvas.height/2 - player.height;
  player.vy = 0;
  player.speed = 11;
  player.jumpsLeft = 2;
  player.onGround = false;
  player.visible = true;
  player.horizMultiplier = 1; player.vertMultiplier = 1;

  // reset score and color cycling
  score = 0; colorLerp = 0; globalTime = 0;
  colorIndex = 0; platformColor = {...baseColors[0]}; nextColor = baseColors[1];

  // Create a guaranteed ground platform inside viewport so you do NOT get a black void
  const groundHeight = BLOCK_SIZE;
  platforms.push({
    x: 0,
    y: Math.max(100, canvas.height - groundHeight * 2),  // visible on screen
    width: Math.max(canvas.width, BLOCK_SIZE*10),
    height: groundHeight,
    color: {...platformColor},
    passed: false
  });

  lastPlatformX = platforms[platforms.length-1].x + platforms[platforms.length-1].width;
  lastPlatformY = platforms[platforms.length-1].y;
}

/* ---------- Platform generator (blocks) ---------- */
function generateBlockPlatform(lastX, lastY){
  let blockCount = Math.floor(Math.random()*8)+1;
  if(Math.random()<0.7) blockCount = Math.min(blockCount,Math.floor(Math.random()*3+1));
  let gap = Math.floor(Math.random()*5+3) * BLOCK_SIZE;
  let x = lastX + gap;
  let y = lastY + (Math.floor(Math.random()*3)-1) * BLOCK_SIZE;
  y = Math.max(BLOCK_SIZE, Math.min(canvas.height - 3*BLOCK_SIZE, y));

  for(let i=0;i<blockCount;i++){
    platforms.push({ x: x + i*BLOCK_SIZE, y, width: BLOCK_SIZE, height: BLOCK_SIZE, color: {...platformColor}, passed:false });
    if(Math.random() < 0.2){
      spikes.push({ x: x + i*BLOCK_SIZE + BLOCK_SIZE*0.2, y: y - BLOCK_SIZE + BLOCK_SIZE*0.2, width: BLOCK_SIZE*0.6, height: BLOCK_SIZE*0.6, baseY: y - BLOCK_SIZE + BLOCK_SIZE*0.2, hit:true, passed:false });
    }
  }

  // gems
  for(let i=0;i<blockCount;i++){
    if(Math.random() < 0.1 || gemEveryBlock){
      let gemX = x + i*BLOCK_SIZE + BLOCK_SIZE/4;
      let gemY = y - BLOCK_SIZE*1.5;
      let safe = true;
      for(let s of spikes){ if(Math.abs(gemX - s.x) < BLOCK_SIZE*2) safe=false; }
      if(safe) gems.push({ x: gemX, y: gemY, size: 20, collected:false, floatOffset: Math.random()*Math.PI*2 });
    }
  }

  return { x: x + blockCount*BLOCK_SIZE, y };
}

/* ---------- Collision helpers ---------- */
function checkSpikeCollision(spike){
  if(!spike.hit) return false;
  const hbW = player.width * player.hitboxScale;
  const hbH = player.height * player.hitboxScale;
  const hbX = player.x + (player.width - hbW)/2;
  const hbY = player.y + (player.height - hbH)/2;
  return hbX + hbW > spike.x && hbX < spike.x + spike.width && hbY + hbH > spike.y && hbY < spike.y + spike.height;
}

/* ---------- Particles / crash pieces ---------- */
class Particle {
  constructor(x,y,vx,vy,life,color){
    this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.life = life; this.color = color;
  }
  update(){ this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= 1; }
  draw(){ if(this.life>0){ ctx.fillStyle = this.color; ctx.fillRect(this.x - cameraX, this.y - cameraY, 4,4); } }
}

function spawnParticles(cx,cy,type,amountMul=1){
  const base = type === "double" ? 20 : (type === "land" ? 10 : 15);
  const count = Math.max(0, Math.floor(base * (amountMul || runtime.effects.jumpEffectMul || 1)));
  const color = type === "double" ? "#ff0" : (type === "jump" ? "#0ff" : "#fff");
  for(let i=0;i<count;i++){
    const vx = (Math.random()-0.5)*6;
    const vy = (Math.random()-1.5)*6;
    particles.push(new Particle(cx + (Math.random()-0.5)*6, cy + (Math.random()-0.5)*6, vx, vy, Math.floor(Math.random()*40+20), color));
  }
}

function createCrash(){
  const pieces = Math.max(6, Math.floor(20 * (runtime.effects.dieEffectMul || 1)));
  for(let i=0;i<pieces;i++){
    crashPieces.push({
      x: player.x + Math.random()*player.width,
      y: player.y + Math.random()*player.height,
      vx: (Math.random()-0.5)*12,
      vy: (Math.random()-1)*12,
      size: Math.random()*player.width/4+4,
      color: player.color,
      life: 80 + Math.random()*60
    });
  }
}

/* ---------- Lines background ---------- */
function addLine(){
  if(!runtime.linesEnabled) return;
  const chance = Math.min(1, 0.15 * (runtime.effects.horizontalLinesMul || 0));
  if(Math.random() > chance) return;
  lines.push({ x: canvas.width + Math.random()*200, y: Math.random()*canvas.height, width: Math.random()*50+20, passed:false });
}

/* ---------- Input handling ---------- */
let lastTouchEndTime = 0;
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(["KeyW","ArrowUp","Space"].includes(e.code)) jump();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('mousedown', () => { if(Date.now() - lastTouchEndTime < 400) return; jump(); });
window.addEventListener('touchstart', () => { lastTouchEndTime = Date.now(); jump(); });

function jump(){
  if(!player.visible) return;
  if(cheats.infiniteJump || player.jumpsLeft > 0){
    player.vy = JUMP_SPEED;
    spawnParticles(player.x + player.width/2, player.y + player.height, player.jumpsLeft === 2 ? "jump" : "double", runtime.effects.jumpEffectMul);
    if(!cheats.infiniteJump) player.jumpsLeft--;
  }
}

/* ---------- Game step (physics/collisions) ---------- */
function worldStep(deltaSec){
  if(!gameRunning) return;
  // accelerate slowly
  player.speed += 0.002;

  // color cycling
  colorLerp += deltaSec/25;
  if(colorLerp >= 1){
    colorIndex = (colorIndex + 1) % baseColors.length;
    nextColor = baseColors[(colorIndex+1) % baseColors.length];
    colorLerp = 0;
  }
  platformColor = lerpColor(baseColors[colorIndex], nextColor, colorLerp);

  // physics
  player.y += player.vy * player.vertMultiplier;
  if(cheats.float && player.vy > 0) player.vy *= 0.5;
  player.vy += GRAVITY * player.vertMultiplier;
  player.x += player.speed * player.horizMultiplier;

  // platform collision
  player.onGround = false;
  for(let plat of platforms){
    if(player.x + player.width > plat.x && player.x < plat.x + plat.width &&
       player.y + player.height > plat.y && player.y + player.height < plat.y + plat.height + player.vy + 1){
      if(player.vy >= 0){
        player.y = plat.y - player.height;
        player.vy = 0;
        player.onGround = true;
        player.jumpsLeft = 2;
        spawnParticles(player.x + player.width/2, player.y + player.height, "land", runtime.effects.walkEffectMul);
        plat.y += 2; // subtle sink
      }
    }
    if(!plat.passed && player.x > plat.x + plat.width){
      score += 1;
      plat.passed = true;
    }
  }

  if(player.y > canvas.height + 300){
    player.jumpsLeft = 1;
    tryDie();
  }

  // spikes
  for(let s of spikes){
    if(checkSpikeCollision(s)) tryDie(s);
    if(!s.passed && player.x > s.x + s.width){
      score += 1; s.passed = true;
    }
  }

  // gems
  for(let g of gems){
    if(!g.collected && player.x + player.width > g.x && player.x < g.x + g.size && player.y + player.height > g.y && player.y < g.y + g.size){
      score += 50; g.collected = true;
      spawnParticles(g.x + g.size/2, g.y + g.size/2, "double", runtime.effects.jumpEffectMul);
    }
  }

  // generation
  const lastPlatform = platforms[platforms.length - 1];
  if(lastPlatform && lastPlatform.x < player.x + canvas.width){
    const out = generateBlockPlatform(lastPlatform.x, lastPlatform.y);
    lastPlatformX = out.x; lastPlatformY = out.y;
  }

  addLine();

  // update crash pieces
  for(let i=crashPieces.length-1;i>=0;i--){
    const p = crashPieces[i];
    p.vy += GRAVITY;
    p.x += p.vx; p.y += p.vy; p.life--;
    if(p.life <= 0) crashPieces.splice(i,1);
  }

  // update particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.update();
    if(p.life <= 0) particles.splice(i,1);
  }

  // update lines array movement
  for(let i=lines.length-1;i>=0;i--){
    const l = lines[i];
    l.x -= player.speed * 0.5 * player.horizMultiplier;
    if(l.x + 50 < 0) lines.splice(i,1);
  }
}

/* ---------- Death / tryDie ---------- */
function tryDie(spike){
  if(!player.visible) return;
  if(cheats.invincible) return;
  if(player.onGround || player.vy > 0){
    player.visible = false;
    if(spike) spike.hit = false;
    createCrash();
    gameRunning = false;
    if(score > bestScore){
      bestScore = Math.floor(score);
      localStorage.setItem('bestScore', bestScore);
    }
    setTimeout(()=> {
      // show menu again
      document.getElementById('menu').style.display = 'flex';
      document.getElementById('bestScore').innerText = 'Best Score: ' + bestScore;
    }, 900);
  }
}

      else if(root1 === 'JiMmYiStHeCoOlEsTgUy|2025.letmecheat|L^UP++0U+L0UD'){

/* ---------- Rendering ---------- */
let lastRenderTime = performance.now();
let fps = 0;
function draw(){
  // clear
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background (plain)
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // horizontal lines background
  if(runtime.linesEnabled){
    for(let l of lines){
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(l.x - cameraX, l.y - cameraY);
      ctx.lineTo(l.x + l.width - cameraX, l.y - cameraY);
      ctx.stroke();
    }
  }

  // platforms
  for(let plat of platforms){
    const useTexture = runtime.effects.blockTextureMul > 0.5;
    if(useTexture){
      for(let y = plat.y; y < canvas.height; y += BLOCK_SIZE){
        let dark = (y === plat.y) ? 1 : 0.3;
        const grd = ctx.createLinearGradient(plat.x - cameraX, y - cameraY, plat.x + plat.width - cameraX, y + BLOCK_SIZE - cameraY);
        grd.addColorStop(0, `rgba(${Math.floor(plat.color.r*dark)},${Math.floor(plat.color.g*dark)},${Math.floor(plat.color.b*dark)},1)`);
        grd.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = grd;
        if(runtime.glowEnabled){ ctx.shadowColor = `rgba(${plat.color.r},${plat.color.g},${plat.color.b},0.9)`; ctx.shadowBlur = plat === platforms[0] ? 12 : 0; }
        ctx.fillRect(plat.x - cameraX, y - cameraY, plat.width, BLOCK_SIZE);
        ctx.shadowBlur = 0;
      }
    } else {
      ctx.fillStyle = `rgb(${plat.color.r},${plat.color.g},${plat.color.b})`;
      ctx.fillRect(plat.x - cameraX, plat.y - cameraY, plat.width, plat.height);
    }
  }

  // spikes
  for(let s of spikes){
    let pulse = Math.sin(globalTime*5 + s.x) * 5;
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.moveTo(s.x - cameraX, s.baseY + s.height - cameraY + pulse);
    ctx.lineTo(s.x - cameraX + s.width/2, s.baseY - cameraY + pulse);
    ctx.lineTo(s.x - cameraX + s.width, s.baseY + s.height - cameraY + pulse);
    ctx.closePath();
    ctx.fill();
  }

  // gems
  for(let g of gems){
    if(g.collected) continue;
    g.floatOffset = g.floatOffset || Math.random()*Math.PI*2;
    let floatY = Math.sin(globalTime*3 + g.floatOffset) * 5;
    ctx.save();
    ctx.translate(g.x + g.size/2 - cameraX, g.y + g.size/2 - cameraY + floatY);
    ctx.rotate(Math.PI/4);
    ctx.fillStyle = "white";
    if(runtime.glowEnabled){ ctx.shadowColor = "white"; ctx.shadowBlur = 20 + 10 * Math.sin(globalTime*5); }
    ctx.fillRect(-g.size/2, -g.size/2, g.size, g.size);
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  // trail clones
  if(player.visible && runtime.trailEnabled){
    if(trail.length === 0 || Math.hypot(player.x - trail[trail.length-1].x, player.y - trail[trail.length-1].y) > 15){
      trail.push({ x: player.x, y: player.y, width: player.width, height: player.height, color: player.color });
    }
    const maxTrailLen = Math.max(10, Math.floor(50 * (runtime.effects.trailMul || 1)));
    if(trail.length > maxTrailLen) trail.shift();
    for(let i=0;i<trail.length;i++){
      const t = trail[i];
      ctx.save();
      let alpha = (i+1)/trail.length;
      ctx.globalAlpha = alpha * 0.6;
      if(runtime.glowEnabled){ ctx.shadowColor = t.color; ctx.shadowBlur = 15 * alpha; }
      ctx.fillStyle = t.color;
      ctx.fillRect(t.x - cameraX, t.y - cameraY, t.width, t.height);
      ctx.strokeStyle = t.color; ctx.lineWidth = 4; ctx.strokeRect(t.x - cameraX, t.y - cameraY, t.width, t.height);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  } else {
    trail = [];
  }

  // crash pieces
  for(let p of crashPieces){
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cameraX, p.y - cameraY, p.size, p.size);
  }

  // particles
  for(let p of particles){
    if(p.life > 0){
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - cameraX, p.y - cameraY, 4, 4);
    }
  }

  // player
  if(player.visible){
    if(runtime.glowEnabled){ ctx.shadowColor = "#0ff"; ctx.shadowBlur = 20; }
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - cameraX, player.y - cameraY, player.width, player.height);
    if(runtime.glowEnabled) ctx.shadowBlur = 0;
    ctx.strokeStyle = "#0ff"; ctx.lineWidth = 6; ctx.strokeRect(player.x - cameraX, player.y - cameraY, player.width, player.height);
  }

  // HUD
  const hudScore = document.getElementById('scoreHUD');
  hudScore.innerText = 'Score: ' + Math.floor(score);
  document.getElementById('bestScore').innerText = 'Best Score: ' + bestScore;

  // fps label already updated in loop
}

/* ---------- Main loop with FPS limiting ---------- */
let lastLoopTime = performance.now();
let accumulated = 0;
function mainLoop(now){
  requestAnimationFrame(mainLoop);
  if(!now) now = performance.now();
  const deltaMs = now - lastLoopTime;
  lastLoopTime = now;
  const deltaSec = deltaMs / 1000;
  globalTime += deltaSec;

  // FPS limiting
  if(runtime.minFrameTime > 0){
    accumulated += deltaMs;
    if(accumulated < runtime.minFrameTime) return;
    accumulated = 0;
  }

  // world step & draw
  if(gameRunning && player.visible){
    worldStep(deltaSec);
  }
  // camera smoothing: center camera on player (offset)
  const targetCamX = player.x - 150;
  const targetCamY = player.y - canvas.height/2 + player.height*1.5;
  cameraX = cameraX * 0.9 + targetCamX * 0.1;
  cameraY = cameraY * 0.9 + targetCamY * 0.1;

  // draw
  draw();

  // update crash/particles movement done in worldStep; here we update FPS display
  fps = 1000 / Math.max(1, deltaMs);
  // update fps label top-left (as "FPS: current / max")
  const fpsLabel = document.getElementById('fpsLabel');
  const maxFPSText = settings.maxFPS === 0 ? 'Unlimited' : settings.maxFPS;
  fpsLabel.innerText = `FPS: ${Math.round(fps)} / ${maxFPSText} — Quality: ${settings.qualityPreset}`;
}

/* ---------- Start / Reset Game ---------- */
function startGame(){
  document.getElementById('menu').style.display = 'none';
  resetWorld();
  gameRunning = true;
  player.visible = true;
}
document.getElementById('startBtn').addEventListener('click', startGame);

    }

  });
});

/* ---------- Game initialization ---------- */
// make sure we have at least a default settings object saved if none exists
if(!localStorage.getItem(LS_KEY)){
  writeSettings(defaultSettings);
  settings = readSettings();
  applySettings(settings);
} else {
  settings = readSettings();
  applySettings(settings);
}

// init ground/platforms and show menu
resetWorld();
document.getElementById('bestScore').innerText = 'Best Score: ' + bestScore;
document.getElementById('menu').style.display = 'flex';

// start the RAF loop
requestAnimationFrame(mainLoop);

/* ---------- Expose some functions for settings window if opened in same origin ---------- */
window.getCurrentSettings = () => settings;
window.applySettings = (s) => { applySettings(s); settings = s; };
window.setQualityPreset = (name) => {
  settings.qualityPreset = name;
  const p = qualityPresets[name];
  if(p){
    settings.quality.jumpEffect = p.jumpEffect || 0;
    settings.quality.walkEffect = p.walkEffect || 0;
    settings.quality.dieEffect = p.dieEffect || 0;
    settings.quality.horizontalLines = p.horizontalLines || 0;
    settings.quality.trail = p.trail ? 100 : 0;
    settings.quality.blockTexture = p.blockTexture ? 100 : 0;
  }
  applySettings(settings);
};
