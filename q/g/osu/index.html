      window.__jqrgUserGestureFired = true;
      try { window.dispatchEvent(new Event('jqrg-user-gesture')); } catch (_) {}
      startSplash();
    }
    btn.addEventListener('click', dismiss);
    btn.addEventListener('touchend', dismiss, { passive: false });
    try { btn.focus(); } catch (_) {}
  }

  function preloadImage(url, slot) {
    return new Promise(function (resolve) {
      var img = new Image();
      var done = false;
      function finish() { if (done) return; done = true; splashAssets[slot] = img; resolve(img); }
      img.onload = finish;
      img.onerror = finish;
      img.src = url;
      setTimeout(finish, 4000);
    });
  }

  function preloadSplashAssets() {
    if (splashAssetsReady) return splashAssetsReady;
    splashAssetsReady = Promise.all([preloadImage(BG_URL, 'bg'), preloadImage(getEffectiveBannerUrl(), 'banner')]);
    return splashAssetsReady;
  }

  function startSplash() {
    if (splashStarted || disposed) return;
    splashStarted = true;
    if (!overlay) { cleanup(); return; }
    overlay.classList.add('jqrg-splash');
    preloadSplashAssets().then(playSplash);
  }

  function playSplash() {
    if (disposed || !overlay) { cleanup(); return; }
    if (bgEl) bgEl.style.backgroundImage = useBlackSplashBackground() ? 'none' : 'url("' + BG_URL + '")';
    if (bannerEl) bannerEl.src = getEffectiveBannerUrl();

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (bgEl) bgEl.style.opacity = '1';
      });
    });

    setTimeout(function () { if (bannerEl && !disposed) bannerEl.classList.add('jqrg-banner-anim'); }, BG_FADE_IN_MS);
    setTimeout(function () { if (bannerEl && !disposed) bannerEl.classList.add('jqrg-banner-out'); }, BG_FADE_IN_MS + BANNER_ANIM_MS);
    setTimeout(function () {
      if (bgEl && !disposed) { bgEl.style.transition = 'opacity ' + (BG_FADE_OUT_MS / 1000) + 's linear'; bgEl.style.opacity = '0'; }
    }, BG_FADE_IN_MS + BANNER_ANIM_MS + BANNER_FADE_OUT_MS);
    setTimeout(cleanup, BG_FADE_IN_MS + BANNER_ANIM_MS + BANNER_FADE_OUT_MS + BG_FADE_OUT_MS + 50);
  }

  function cleanup() {
    if (disposed) return;
    disposed = true;
    if (overlay && overlay.parentNode) { overlay.parentNode.removeChild(overlay); }
    if (tipTimer) { clearTimeout(tipTimer); tipTimer = null; }
    if (tipTransitionTimer) { clearTimeout(tipTransitionTimer); tipTransitionTimer = null; }
    tipEl = null;
    tipLines = null;
    overlay = barFillEl = sizeTextEl = pctTextEl = bgEl = bannerEl = null;
    document.documentElement.classList.remove('jqrg-loader-active');
    seenResources = null;
  }

  function loadTipLines() {
    if (disposed || !tipEl) return;
    if (window.__JqrgLoaderLines && window.__JqrgLoaderLines.length) { primeTips(window.__JqrgLoaderLines); return; }
    try {
      var s = document.createElement('script');
      s.src = '/js/jqrg-loader-lines.js';
      s.async = true;
      s.onload = function () { if (disposed) return; if (window.__JqrgLoaderLines && window.__JqrgLoaderLines.length) primeTips(window.__JqrgLoaderLines); };
      (document.head || document.documentElement).appendChild(s);
    } catch (_) {}
  }

  function primeTips(lines) {
    if (disposed || !tipEl) return;
    var arr = lines.slice();
    for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
    tipLines = arr;
    tipIndex = 0;
    showCurrentTip();
  }

  function showCurrentTip() {
    if (disposed || !tipEl || !tipLines || !tipLines.length) return;
    var line = tipLines[tipIndex % tipLines.length];
    tipEl.textContent = line;
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { if (tipEl) tipEl.classList.add('jqrg-tip-show'); });
    });
    tipTimer = setTimeout(function () {
      tipTimer = null;
      if (disposed || !tipEl) return;
      tipEl.classList.remove('jqrg-tip-show');
      tipTransitionTimer = setTimeout(function () {
        tipTransitionTimer = null;
        if (disposed) return;
        tipIndex++;
        showCurrentTip();
      }, 380);
    }, 4500);
  }

  function deferredCompleteCheck() {
    if (completed) return;
    if (deferredCompleteTimer) { clearTimeout(deferredCompleteTimer); deferredCompleteTimer = null; }
    if (hasEngineProgress) return;
    var now = Date.now();
    var sinceLoad = loadFiredTime > 0 ? now - loadFiredTime : 0;
    var sinceResource = lastResourceTime > 0 ? now - lastResourceTime : sinceLoad;
    if (sinceLoad >= QUIET_AFTER_LOAD_MS && sinceResource >= QUIET_AFTER_RESOURCE_MS) { scheduleComplete(0); return; }
    deferredCompleteTimer = setTimeout(deferredCompleteCheck, 200);
  }

  function onWindowLoad() {
    if (completed) return;
    loadFiredTime = Date.now();
    if (hasEngineProgress && engineProgress < 0.999) return;
    if (hasEngineProgress) { scheduleComplete(150); return; }
    deferredCompleteCheck();
  }

  startResourceObserver();
  preloadSplashAssets();

  function mountWhenReady() {
    if (overlay || disposed) return;
    if (document.body) { try { ensureOverlay(); } catch (_) {} return; }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', mountWhenReady, { once: true }); }
    else { setTimeout(mountWhenReady, 0); }
  }
  mountWhenReady();

  if (document.readyState === 'complete') { setTimeout(onWindowLoad, 0); }
  else { window.addEventListener('load', onWindowLoad); }

  maxLoadingTimer = setTimeout(function () { if (!completed) complete(); }, MAX_LOADING_MS);

  window.JqrgLoader = {
    setProgress: function (p) { setEngineProgress(p); },
    setBytes: function (loaded, total) { manualBytesMode = true; setBytesLoaded(loaded); if (total != null) setBytesTotal(total); },
    complete: function () { complete(); },
    isComplete: function () { return completed; },
    splashDurationMs: BG_FADE_IN_MS + BANNER_ANIM_MS + BANNER_FADE_OUT_MS + BG_FADE_OUT_MS,
  };
})();
</script>

  <script>
    const appElement = document.getElementById('app');
    const launchScreen = document.getElementById('launch');
    const loadingScreen = document.getElementById('loading');
    const loadingInner = document.getElementById('loading-inner');
    const errorScreen = document.getElementById('error');
    const errorScreenMessage = document.getElementById('error-message');
    const errorScreenStack = document.getElementById('error-stack');

    const handleError = (error) => {
      console.error(error);
      if (!errorScreen.hidden) return;
      errorScreen.hidden = false;
      errorScreenMessage.textContent = '' + error;
      let debug = error && error.stack || 'no stack';
      debug += '\nUser agent: ' + navigator.userAgent;
      errorScreenStack.textContent = debug;
    };
    const setProgress = (progress) => {
      if (loadingInner) loadingInner.style.width = progress * 100 + '%';
    };
    const interpolate = (a, b, t) => a + t * (b - a);

    try {
      setProgress(0.1);

      const scaffolding = new Scaffolding.Scaffolding();
      scaffolding.width = 480;
      scaffolding.height = 360;
      scaffolding.resizeMode = "preserve-ratio";
      scaffolding.editableLists = false;
      scaffolding.usePackagedRuntime = true;
      scaffolding.setup();
      scaffolding.appendTo(appElement);

      const vm = scaffolding.vm;
      window.scaffolding = scaffolding;
      window.vm = scaffolding.vm;
      window.Scratch = {
        vm,
        renderer: vm.renderer,
        audioEngine: vm.runtime.audioEngine,
        bitmapAdapter: vm.runtime.v2BitmapAdapter,
        videoProvider: vm.runtime.ioDevices.video.provider
      };

      scaffolding.setUsername("player####".replace(/#/g, () => Math.floor(Math.random() * 10)));
      scaffolding.setAccentColor("#8925ad");

      try {
        scaffolding.addCloudProvider(new Scaffolding.Cloud.LocalStorageProvider("cloudvariables:p4-$https://jimmyqrg.github.io/jqrg-games/undertale/simulators/asriel-i.sb3"));
      } catch (error) {
        console.error(error);
      }

      vm.setTurboMode(false);
      if (vm.setInterpolation) vm.setInterpolation(false);
      if (vm.setFramerate) vm.setFramerate(240);
      if (vm.renderer.setUseHighQualityRender) vm.renderer.setUseHighQualityRender(true);
      if (vm.setRuntimeOptions) vm.setRuntimeOptions({
        fencing: true,
        miscLimits: false,
        maxClones: 9999999999,
      });
      if (vm.setCompilerOptions) vm.setCompilerOptions({
        enabled: true,
        warpTimer: false
      });
      if (vm.renderer.setMaxTextureDimension) vm.renderer.setMaxTextureDimension(2048);

      // enforcePrivacy threat model only makes sense in the editor
      if (vm.runtime.setEnforcePrivacy) vm.runtime.setEnforcePrivacy(false);

      if (typeof ScaffoldingAddons !== 'undefined') {
        ScaffoldingAddons.run(scaffolding, {"gamepad":false,"pointerlock":false,"specialCloudBehaviors":false,"unsafeCloudBehaviors":false,"pause":false});
      }

      scaffolding.setExtensionSecurityManager({
        getSandboxMode: () => 'unsandboxed',
        canLoadExtensionFromProject: () => true
      });
      for (const extension of []) {
        vm.extensionManager.loadExtensionURL(extension);
      }

    } catch (e) {
      handleError(e);
    }
  </script>
  
  
    <script>
      const getProjectData = (function() {
        const storage = scaffolding.storage;
        storage.onprogress = (total, loaded) => {
          setProgress(interpolate(0.2, 0.98, loaded / total));
        };
        
        storage.addWebStore(
          [
            storage.AssetType.ImageVector,
            storage.AssetType.ImageBitmap,
            storage.AssetType.Sound,
            storage.AssetType.Font
          ].filter(i => i),
          (asset) => new URL('./assets/' + asset.assetId + '.' + asset.dataFormat, location).href
        );
        return () => new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.onload = () => {
          resolve(xhr.response);
        };
        xhr.onerror = () => {
          if (location.protocol === 'file:') {
            reject(new Error('Zip environment must be used on a website, not on a local file. To fix this error, use the "Plain HTML" environment instead.'));
          } else {
            reject(new Error('Request to load project data failed.'));
          }
        };
        xhr.onprogress = (e) => {
          if (e.lengthComputable) {
            setProgress(interpolate(0.1, 0.2, e.loaded / e.total));
          }
        };
        xhr.responseType = 'arraybuffer';
        xhr.open('GET', "./assets/project.json");
        xhr.send();
      });
      })();
    </script>
  <script>
    const run = async () => {
      const projectData = await getProjectData();
      await scaffolding.loadProject(projectData);
      setProgress(1);
      loadingScreen.hidden = true;
      if (true) {
        scaffolding.start();
      } else {
        launchScreen.hidden = false;
        launchScreen.addEventListener('click', () => {
          launchScreen.hidden = true;
          scaffolding.start();
        });
        launchScreen.focus();
      }
    };
    run().catch(handleError);
  </script>
