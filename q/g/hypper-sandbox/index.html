<script>
/* jqrg-loader.js
 * Universal game loading screen. Each game page includes this script
 * (non-deferred) in <head> so it can intercept engine globals before they
 * run. Games with custom download loops (Unity + zip, etc.) should call
 * `window.JqrgLoader.setBytes(loaded, total)` so the size readout shows a
 * real total instead of a placeholder.
 *
 *   1. Paints a black overlay with a progress bar and size counter.
 *   2. Hooks every game engine we ship (Unity, Godot, Ruffle, EmulatorJS,
 *      Construct, GameMaker, plain HTML/JS) so it can drive that progress
 *      bar with real numbers when possible. PerformanceObserver is the
 *      universal fallback - it tracks transferSize for every resource the
 *      page downloads and gives us byte counts even when the engine refuses
 *      to talk to us.
 *   3. When the engine reports complete (or window.load fires), it plays
 *      the branded splash: fade in /background.png, scale + fade in the
 *      banner image (default /banner.png, or <meta name="jqrg-loader-banner-url"
 *      content="..."> when set *before* this script), fade out, remove overlay.
 *
 * The script is idempotent - loading twice is a no-op - and it cleans up
 * its listeners and DOM after the splash so it does not leak into games.
 */
(function () {
  'use strict';
  if (typeof window === 'undefined') return;
  if (window.__JqrgLoaderLoaded) return;
  window.__JqrgLoaderLoaded = true;

  // ---------- Configuration --------------------------------------------------
  var BG_URL = '/background.png';
  var BANNER_URL = '/banner.png';
  // Optional per-page splash + loading-phase brand image (copyright / branding).
  // Place in <head> *before* this script: <meta name="jqrg-loader-banner-url" content="/path/logo.png">
  // Absolute paths are recommended when the page uses <base href>.
  function getBannerUrlOverride() {
    try {
      var m = document.querySelector('meta[name="jqrg-loader-banner-url"]');
      if (!m || !m.content) return null;
      var raw = String(m.content).trim();
      if (!raw) return null;
      if (/^https?:\/\//i.test(raw) || raw.charAt(0) === '/') return raw;
      try {
        return new URL(raw, document.baseURI || location.href).href;
      } catch (_) {
        return raw;
      }
    } catch (_) {}
    return null;
  }
  function getEffectiveBannerUrl() {
    var o = getBannerUrlOverride();
    return o || BANNER_URL;
  }
  // Optional per-page splash background override.
  // <meta name="jqrg-loader-black-bg" content="1"> keeps splash background black
  // instead of fading in /background.png.
  function useBlackSplashBackground() {
    try {
      var m = document.querySelector('meta[name="jqrg-loader-black-bg"]');
      if (!m || !m.content) return false;
      var v = String(m.content).toLowerCase();
      return v === '1' || v === 'true' || v === 'yes' || v === 'on';

  // banner phases: fade-in grows by 0.20 over BANNER_ANIM_MS, fade-out grows

  // ms expansion rate). That makes the "keep expanding while fading out" look
  // visually continuous instead of a fresh scale bump kicking in mid-fade.
  var BG_FADE_IN_MS = 1000;      // background fade from black to image
  var BANNER_ANIM_MS = 2500;     // banner scale + fade in (linear)
  var BANNER_FADE_OUT_MS = 1250; // banner fade out (banner keeps expanding)
  var BG_FADE_OUT_MS = 1000;     // background fade back to black
  // Keep banner growth continuous across fade-in and fade-out by using
  // matching scale velocity in both phases.
  var BANNER_MID_SCALE = 1.05;   // scale at end of fade-in
  var BANNER_END_SCALE = 1.175;  // final scale at end of fade-out
  var MIN_LOADING_MS = 600;      // never blink past instantly even on cache
  var MAX_LOADING_MS = 90000;    // hard ceiling so we never strand the user

  // Deferred completion: when only PerformanceObserver is tracking (no engine
  // hook caught), wait for resource activity to settle before completing.

  // (e.g. Hollow Knight downloads its .data/.wasm via fetch() in an IIFE,
  // then dynamically loads the Unity loader script).
  var QUIET_AFTER_RESOURCE_MS = 1500; // resource activity must be quiet this long
  var QUIET_AFTER_LOAD_MS = 800;      // and at least this long since window.load
  var ENGINE_WAIT_MS = 8000;          // grace window for an engine global that
                                      // appeared but hasn't fired progress yet

  var hasEngineProgress = false;

  var splashStarted = false;

  // and remembering the Image objects, eliminates that gap.
  var splashAssets = { bg: null, banner: null };
  var splashAssetsReady = null;

  // ---------- Unit formatting -----------------------------------------------
  // The user spec scales all numbers by the *largest of loaded/total*, so the
  // "/" line never mixes units. < 10 of a unit drops down to the next unit.
  function formatPair(loaded, total) {
    var ref = Math.max(loaded || 0, total || 0);
    if (ref >= 10 * 1024 * 1024) {
      return formatMB(loaded) + ' / ' + formatMB(total);
    }
    if (ref >= 10 * 1024) {
      return formatKB(loaded) + ' / ' + formatKB(total);
    }
    if (ref >= 10) {
      return formatB(loaded) + ' / ' + formatB(total);
    }
    return (loaded || 0) + ' / ' + (total || 0);
  }
  // Used when totalBytesKnown is false: scale by loaded alone and show
  // the right-hand side as the same "--.--" placeholder used at boot.
  // This prevents the right value from mirroring the left value (which
  // is what made the readout look like "5MB / 5MB" updating in lockstep).
  function formatPairUnknownTotal(loaded) {
    if (loaded >= 10 * 1024 * 1024) return formatMB(loaded) + ' / --.--MB';
    if (loaded >= 10 * 1024) return formatKB(loaded) + ' / --KB';
    if (loaded >= 10) return formatB(loaded) + ' / --B';
    return (loaded || 0) + ' / --';
  }
  function formatMB(b) {
    if (!b || b < 0) return '--.--MB';
    return (b / (1024 * 1024)).toFixed(2) + 'MB';
  }
  function formatKB(b) {
    if (!b || b < 0) return '--KB';
    return Math.round(b / 1024) + 'KB';
  }
  function formatB(b) {
    if (!b || b < 0) return '--B';
    return Math.round(b) + 'B';
  }

  function ensureOverlay() {

    bgEl.id = 'jqrg-loader-bg';

    content.id = 'jqrg-loader-content';

  function refreshUI() {

    'max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
  matzToastWrap.appendChild(node);
  matzToastQueue.push(node);
  // Cap visible cards at 5 — drop oldest.
  while (matzToastQueue.length > 5) {
    var old = matzToastQueue.shift();
    if (old && old.parentNode) old.parentNode.removeChild(old);
  }
  origRAF(function(){
    node.style.opacity = '1';
    node.style.transform = 'translateX(0)';
  });
  setTimeout(function(){
    node.style.opacity = '0';
    node.style.transform = 'translateX(20px)';
    setTimeout(function(){
      if (node && node.parentNode) node.parentNode.removeChild(node);
      var i = matzToastQueue.indexOf(node);
      if (i !== -1) matzToastQueue.splice(i, 1);
    }, 220);
  }, 4000);
}

// --- 2d. HEAP access helpers ---
function getModule(){
  try{
    if(window.gameInstance && window.gameInstance.Module) return window.gameInstance.Module;
    if(window.unityInstance && window.unityInstance.Module) return window.unityInstance.Module;
  }catch(e){}
  return null;
}
function getHeapF32(){ var m=getModule(); return m?m.HEAPF32:null; }
function getHeapU8(){ var m=getModule(); return m?m.HEAPU8:null; }
function getHeapU32(){ var m=getModule(); return m?m.HEAPU32:null; }
function getHeapI32(){ var m=getModule(); return m?m.HEAP32:null; }
// Per-frame counters for the diagnostic log. The Diagnostics hack
// reads these to surface a "things attempted, things succeeded"
// snapshot to the user.
var matzSendMsgAttempts = 0;
var matzSendMsgSuccesses = 0;
var matzSendMsgLog = [];        // ring buffer of last 200 calls
var matzSendMsgLogVerbose = false; // set true by Diagnostics hack
function sendMsg(obj,fn,val){
  matzSendMsgAttempts++;
  var ok = false;
  var err = null;
  try{
    // Try the gameInstance.SendMessage path first — this is the
    // public API returned by createUnityInstance and is always safe.
    var gi = window.gameInstance || window.unityInstance;
    if(gi && gi.SendMessage){
      if(val===undefined) gi.SendMessage(obj,fn);
      else gi.SendMessage(obj,fn,String(val));
      ok = true;
    } else {
    var m=getModule();
      if(m && m.SendMessage){
        if(val===undefined) m.SendMessage(obj,fn);
        else m.SendMessage(obj,fn,String(val));
        ok = true;
      }
    }
  }catch(e){ err = e; }
  if (ok) matzSendMsgSuccesses++;
  if (matzSendMsgLogVerbose) {
    matzSendMsgLog.push({t:Date.now(), obj:obj, fn:fn, val:val, ok:ok, err:err && (err.message||String(err))});
    if (matzSendMsgLog.length > 200) matzSendMsgLog.shift();
  }
  return ok;
}

/* ================================================================
   2d-extended. SCENE TARGET BROADCAST
   ================================================================
   Many of our hacks need to talk to a Unity GameObject whose name
   we don't know exactly — the local player prefab in particular is
   instantiated at runtime with a generated name. So instead of
   guessing one, we maintain a curated list of every GameObject
   name that decompiling the build's data archive surfaced, plus
   common Photon / Unity defaults, and broadcast our SendMessage
   calls to all of them. SendMessage silently no-ops when the
   target doesn't exist, so cost is just one C-call per name. */
/* The build's IL2CPP metadata (extracted from the data archive)
   confirms these MonoBehaviour class names are real:
     PlayerControllerRigidbody, PlayerFlightControl, PlayerLookOld,
     PlayerManager, PlayerMovement, PlayerSync,
     PlayerThirdPersonCamera, PlayerWeaponManager, PlayerRepulsion,
     Character, CharacterData, CharacterHelper, Crosshair,
     Vehicle, VehicleManager, Weapon, WeaponSelection, NetworkWeapon
   These are CLASS names. The local-player GameObject in the scene
   typically takes the name of the prefab it was instantiated from,
   which (per Unity's MonoSingleton convention used by manager
   classes) is the same as the class name for singletons; for
   PUN-instantiated prefabs, the GameObject keeps the prefab's
   name (often with a "(Clone)" suffix). We broadcast SendMessage
   to every plausible variant — Unity silently no-ops misses. */
var MATZ_PLAYER_TARGETS = [
  // Confirmed-real MonoBehaviour class names (from data archive).
  'PlayerControllerRigidbody','PlayerSync','PlayerWeaponManager',
  'PlayerLookOld','PlayerThirdPersonCamera','PlayerFlightControl',
  'PlayerMovement','PlayerRepulsion','PlayerManager','PlayerTransform',
  'PlayerLook','PlayerControl','PlayerState',
  // Local-player prefab name candidates (none of these were found
  // as literals in the data archive, so they're best-effort).
  'Player','LocalPlayer','MyPlayer','Player(Clone)','PlayerLocal',
  'Hero','Hero(Clone)','HeroPlayer','HypperPlayer','Character',
  'Character(Clone)','CharacterController','Avatar','Pawn',
  // Components attached to player.
  'Crosshair','CrosshairInfo','CameraFreeHelper','CameraFlightFollow',
  'CameraFollow','CameraSwitch','PlayerThirdPersonCamera',
  // PUN demo player names (build inherits from a PUN sample).
  'PunBasicsPlayer','ThirdPersonCharacter','MyThirdPersonCharacter',
  // Skin/character DB GameObjects.
  'SkinManager','CharacterHelper'
];
var MATZ_GAME_TARGETS = [
  // Confirmed-real manager class names (data archive).
  'GameManager','SkinManager','ChatManager','ToolManager',
  'NetworkObjectsManager','VehicleManager','PlayerManager',
  // Plausible UI / system manager names.
  'GUIManager','UIGameController','UIManager','MainMenu','MenuManager',
  'NetworkManager','RoomListManager','LobbyManager','ServerList',
  'PluginManager','CrazySDKSingleton','SettingsManager','ServiceManager',
  'RagdollManager','SkyManager','ToastMessageManager','MapSetup',
  'SpawnMenu','SpawnMenuDatabase','SpawnPoint','PhotonProperties'
];
// Photon-internal singletons (PhotonNetwork uses an internal
// PhotonHandler GameObject called "PhotonMono"). SendMessage
// broadcasts to these are how we trigger Photon-side actions.
var MATZ_PHOTON_TARGETS = [
  'PhotonMono','PhotonHandler','PunMono','PunHandler',
  'NetworkRunner'
];
function sendMsgAll(targets, method, val){
  var n = 0;
  for (var i = 0; i < targets.length; i++) {
    if (sendMsg(targets[i], method, val)) n++;
  }
  return n;
}
function sendPlayerMsg(method, val){ return sendMsgAll(MATZ_PLAYER_TARGETS, method, val); }
function sendGameMsg(method, val){ return sendMsgAll(MATZ_GAME_TARGETS, method, val); }

// --- 2e. Memory scanner ---
function scanHeapF32(target, tolerance, maxResults){
  var heap = getHeapF32();
  if(!heap) return [];
  tolerance = tolerance || 0.01;
  maxResults = maxResults || 50;
  var results = [];
  for(var i=0; i<heap.length && results.length<maxResults; i++){
    if(Math.abs(heap[i]-target)<tolerance) results.push(i);
  }
  return results;
}

/* ================================================================
   2f. PHOTON RAISE-EVENT HELPERS
   ================================================================
   Photon's wire protocol routes per-game messages through
   `OpRaiseEvent(eventCode, content, ...)`. The server reflects
   them back to other clients (and optionally the sender) as an
   inbound `EventData` frame whose first non-header byte payload
   contains a single byte event code in the 1..199 range
   (0..199 reserved by Photon, with the user space starting at 1).

   The Photon binary opcode for "OperationRequest" is 2 (0xF3 with
   the message type bit) and for "Event" is 4 (0xF4). The first
   byte of a Photon frame is one of:
     0xF3  OperationRequest   (we sent an op)
     0xF4  Event              (server pushed an event)
     0xF7  OperationResponse  (server responded to our op)
     0xF0  Init               (handshake)

   We use this to:
     - Detect whether an inbound binary frame is an Event (0xF4),
       so we can search it for keywords / mutate fields.
     - Detect whether an outbound binary frame is an OpRaiseEvent
       (`OperationRequest` with parameter code 244 ("EventCode")),
       so we can drop or modify outgoing player-state/damage
       events without affecting Photon's keepalive ping. */
var PHOTON_MSG_INIT = 0xF0;
var PHOTON_MSG_OP   = 0xF3;
var PHOTON_MSG_EV   = 0xF4;
var PHOTON_MSG_OPRESP = 0xF7;
function _matzPhotonMsgType(buffer){
  if (!(buffer instanceof ArrayBuffer) || buffer.byteLength < 2) return 0;
  return new Uint8Array(buffer, 0, 1)[0];
}
function _matzAsciiContains(buffer, needle){
  // Cheap "does the printable ASCII portion of this binary frame
  // contain `needle`" test. Skips non-printable bytes, replaces
  // with space. Used by hacks that want to filter on string keys
  // embedded in Photon hashtables (e.g. Health, Damage, Position).
  if (!(buffer instanceof ArrayBuffer)) return false;
  var bytes = new Uint8Array(buffer);
  var s = '';
  for (var i = 0; i < bytes.length; i++) {
    var c = bytes[i];
    s += (c >= 0x20 && c <= 0x7E) ? String.fromCharCode(c) : ' ';
  }
  return s.indexOf(needle) !== -1;
}

}
function _matzInstallPointerLockBlock(){
  if(_matzPointerLockBlocked) return;
  _matzPointerLockBlocked = true;
  // Block requestPointerLock while menu is open.
  //
  // IMPORTANT: each wrapper has to capture *its own* `orig`. Without an
  // IIFE, `var orig` is hoisted to the function scope and shared by every
  // wrapper created in the loop — so when any wrapper fires it reads
  // whatever value `orig` ended up with at the very end of the loop.
  // In modern Chrome the last name we look at (webkitRequestPointerLock
  // on HTMLCanvasElement.prototype) is undefined, so every wrapper would
  // throw "Cannot read properties of undefined (reading 'apply')" the
  // first time the user clicks the canvas. Capturing per-iteration with
  // an IIFE pins each wrapper to the function it was meant to wrap.
  var protos = [Element.prototype, HTMLElement.prototype, HTMLCanvasElement.prototype];
  var fnNames = ['requestPointerLock','mozRequestPointerLock','webkitRequestPointerLock'];
  for(var i=0;i<protos.length;i++){
    var p = protos[i];
    if(!p) continue;
    for(var j=0;j<fnNames.length;j++){
      (function(proto, name){
        var orig = proto[name];
        if(typeof orig !== 'function' || orig.__matzBlocked) return;
        var blocked = function(){
          if(matzVisible) return;
          // Defensive: if `orig` somehow got cleared after install (some
          // anti-cheat code on the host page replaces requestPointerLock
          // entirely), bail rather than throwing.
          if(typeof orig !== 'function') return;
          return orig.apply(this, arguments);
        };
        blocked.__matzBlocked = true;
        blocked.__origMatz = orig;
        try{ proto[name] = blocked; }catch(e){}
      })(p, fnNames[j]);
    }
  }
}
_matzInstallPointerLockBlock();
function _matzShowSystemCursor(show){
  var c = document.getElementById('unity-canvas');
  if(!c) return;
  if(show){
    c.style.cursor = 'auto';
    c.style.pointerEvents = 'none';
  }else{
    c.style.cursor = '';
    c.style.pointerEvents = '';
  }
  document.body.style.cursor = show ? 'auto' : '';
}
function openMatz(){
  matzVisible=true;
  matzRoot.classList.add('open');
  matzCurrentPage='list';
  matzSearchTerm='';
  matzSearch.value='';
  renderUI();
  // Release pointer-lock + show the system cursor + stop forwarding mouse
  // moves to the unity canvas (which is what rotates the player view).
  _matzReleasePointerLock();
  _matzShowSystemCursor(true);
  // Focus the search box so typing works immediately.
  matzSearch.focus();
}
function closeMatz(){
  matzVisible=false;
  matzRoot.classList.remove('open');
  // Restore the canvas's normal mouse handling so the game can resume
  // capturing mouse moves and re-acquire pointer lock when the user clicks.
  _matzShowSystemCursor(false);
}
function toggleMatz(){ matzVisible ? closeMatz() : openMatz(); }

document.getElementById('matz-backdrop').addEventListener('click', closeMatz);
matzCloseBtn.addEventListener('click', closeMatz);
matzSearch.addEventListener('input', function(){ matzSearchTerm=this.value.toLowerCase(); renderUI(); });
matzSearch.addEventListener('keydown', function(e){ e.stopPropagation(); });

/* CRITICAL FIX — Unity steals keystrokes from <input matz-search>.
   ----------------------------------------------------------------
   Unity's WebGL build registers keydown/keypress/keyup listeners
   in capture phase on the document (via emscripten's
   _emscripten_set_keydown_callback_on_thread which calls
   `target.addEventListener(eventTypeString, jsEventHandler, true)`).
   When the registered C# handler returns "consumed", emscripten
   calls e.preventDefault() — which kills the browser's native text
   input pipeline and our search box gets no characters. Even
   stopPropagation in bubble phase is too late.

   We add a capture-phase listener at *both* window and document
   that runs before Unity's. When the active element is our search
   box (or the menu is otherwise consuming input), we stop the
   event before Unity sees it. Unity's handler never runs, never
   calls preventDefault, and the browser delivers the keystroke to
   the input normally.

   We attach to window first because emscripten attaches to
   document with `useCapture: true`. Adding our listener to window
   in capture phase puts us strictly before document-level
   listeners in the dispatch order. We also attach to document in
   capture phase as a belt-and-braces measure for any handler that
   bypasses window. */
function _matzShouldEatKeyForUnity(e){
  // If our search box has focus, never let Unity see the key.
  var ae = document.activeElement;
  if (ae && ae.id === 'matz-search') return true;
  // If any normal text input/contenteditable has focus while menu
  // is open, also block Unity (e.g. future menu fields).
  if (matzVisible && ae) {
    var tag = ae.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || ae.isContentEditable) return true;
  }
  return false;
}
function _matzKeyGuard(e){
  if (_matzShouldEatKeyForUnity(e)) {
    // Allow Escape to close the menu (handled by our own document
    // keydown later) — but still keep Unity from seeing it.
    e.stopImmediatePropagation();
    e.stopPropagation();
    // Do NOT call preventDefault — the input element still needs
    // to process the key normally (typing, arrow keys, etc.).
  }
}
// Capture phase on window — strictly before document-level capture.
window.addEventListener('keydown', _matzKeyGuard, true);
window.addEventListener('keyup',   _matzKeyGuard, true);
window.addEventListener('keypress',_matzKeyGuard, true);
// Capture phase on document — backup if any handler binds here only.
document.addEventListener('keydown', _matzKeyGuard, true);
document.addEventListener('keyup',   _matzKeyGuard, true);
document.addEventListener('keypress',_matzKeyGuard, true);

/* Typing detection — skip hack toggle keys while the user is typing.
   --------------------------------------------------------------------
   The user can rebind any hack to a key like F or G. When that same
   key is pressed inside the in-game chat or the server-password modal,
   the keystroke is meant for the text field, not the hack. Without a
   guard our document-level keydown handler runs first (capture phase)
   and flips the hack on every typed letter.

   Two-pronged detection:
     1. DOM activeElement — Unity 2020+ WebGL parks a hidden input/
        textarea on the page when an InputField/IME is active so it
        can capture keystrokes + IME composition. When the hidden
        field is focused `document.activeElement` points at it and we
        treat the user as typing. Also catches any normal HTML input.
     2. Enter/Escape heuristic — chat in this build opens with Enter
        and submits with Enter; password modals are dismissed with
        Enter or Escape. We toggle a "presumed typing" flag on each
        Enter press and clear it on Escape so keystrokes between an
        open and a submit count as typing even when Unity didn't park
        a DOM input for the field. A 30 s safety timeout makes sure we
        never leave the player permanently locked out of toggle keys
        if a close event is missed (e.g. modal dismissed with mouse). */
var _matzInTyping = false;
var _matzTypingTimer = null;
function _matzSetTyping(state){
  _matzInTyping = !!state;
  if(_matzTypingTimer){ clearTimeout(_matzTypingTimer); _matzTypingTimer = null; }
  if(_matzInTyping){
    _matzTypingTimer = setTimeout(function(){ _matzInTyping = false; }, 30000);
  }
}
function _matzIsTyping(){
  try{
    var ae = document.activeElement;
    if(ae){
      // Our search box can be focused while the menu is open, but
      // toggle keys are already gated on `matzVisible` — be explicit
      // anyway so a stray focus on our own UI never flips the gate.
      if(ae.id === 'matz-search') return _matzInTyping;
      var tag = ae.tagName;
      if(tag === 'INPUT' || tag === 'TEXTAREA') return true;
      if(ae.isContentEditable) return true;
    }
  }catch(_) {}
  return _matzInTyping;
}

// Right Shift toggle — capture phase, before panic key
document.addEventListener('keydown', function(e){
  if(e.code === 'ShiftRight'){
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    toggleMatz();
    return;
  }
  /* Track presumed-typing state on Enter / Escape. We do NOT
     preventDefault here — the keystrokes still need to reach the game
     so chat / password modals can open and submit normally. The flag
     is only used to gate hack toggles below. */
  if(!matzVisible){
    if(e.code === 'Enter' || e.code === 'NumpadEnter'){
      _matzSetTyping(!_matzInTyping);
    } else if(e.code === 'Escape'){
      _matzSetTyping(false);
    }
  }
  // Toggle keys for individual hacks. Skip when the menu is open or
  // the user is typing in chat / a password modal.
  if(!matzVisible && !_matzIsTyping()){
    for(var id in MatzHacks){
      var h = MatzHacks[id];
      if(h.toggleKey && e.code === h.toggleKey){
        toggleHack(h);
        e.preventDefault();
        return;
      }
    }
  }
  // Escape closes menu
  if(e.code === 'Escape' && matzVisible){
    e.preventDefault(); e.stopPropagation();
    if(matzCurrentPage === 'options'){ matzCurrentPage='list'; renderUI(); }
    else closeMatz();
  }
}, true);

/* ================================================================
   SECTION 6 — UI RENDERING
   ================================================================ */
function renderUI(){
  if(matzCurrentPage === 'options' && matzCurrentHackId){
    renderOptionsPage();
    matzSearch.parentElement.style.display = 'none';
  } else {
    renderListPage();
    matzSearch.parentElement.style.display = '';
  }
}

function renderListPage(){
  var keys = Object.keys(MatzHacks);
  var filtered = keys.filter(function(id){
    if(!matzSearchTerm) return true;
    return MatzHacks[id].name.toLowerCase().indexOf(matzSearchTerm) !== -1;
  });
  if(filtered.length === 0){
    matzBody.innerHTML = '<div class="matz-empty">No hacks found</div>';
    return;
  }
  var html = '<div id="matz-grid">';
  for(var i=0; i<filtered.length; i++){
    var h = MatzHacks[filtered[i]];
    var active = h.enabled ? ' active' : '';
    html += '<div class="matz-card'+active+'" data-id="'+h.id+'">'+
      '<span class="matz-dot"></span>'+
      '<span class="matz-card-name">'+esc(h.name)+'</span>'+
      '<span class="matz-card-chevron" data-opt="'+h.id+'" title="Options">'+
        '<svg viewBox="0 0 12 8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 1 6 7 11 1"/></svg>'+
      '</span>'+
    '</div>';
  }
  html += '</div>';
  matzBody.innerHTML = html;
  // Bind events
  var cards = matzBody.querySelectorAll('.matz-card');
  for(var j=0; j<cards.length; j++){
    (function(card){
      var id = card.getAttribute('data-id');
      card.addEventListener('click', function(e){
        if(e.target.classList.contains('matz-card-chevron') || e.target.closest('.matz-card-chevron')) return;
        toggleHack(MatzHacks[id]);
      });
    })(cards[j]);
  }
  var chevs = matzBody.querySelectorAll('.matz-card-chevron');
  for(var k=0; k<chevs.length; k++){
    (function(ch){
      ch.addEventListener('click', function(e){
        e.stopPropagation();
        matzCurrentHackId = ch.getAttribute('data-opt');
        matzCurrentPage = 'options';
        renderUI();
      });
    })(chevs[k]);
  }
}

function renderOptionsPage(){
  var h = MatzHacks[matzCurrentHackId];
  if(!h){ matzCurrentPage='list'; renderUI(); return; }
  var html = '<div id="matz-opts-header">'+
    '<button id="matz-back" type="button" aria-label="Back to hack list">'+
      '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 2 4 7 9 12"/><line x1="4" y1="7" x2="13" y2="7"/></svg>'+
      '<span>Back</span>'+
    '</button>'+
    '<span id="matz-opts-title">'+esc(h.name)+'</span>'+
  '</div>';
  if(h.description) html += '<div id="matz-opts-desc">'+esc(h.description)+'</div>';

  // Render option controls from optionsDef
  var defs = h.optionsDef || [];
  for(var i=0; i<defs.length; i++){
    var d = defs[i];
    html += renderOptRow(h, d);
  }

  // Toggle key (always last, unless noToggle)
  if(!h.noToggle){
    html += '<div class="matz-opt-row">'+
      '<span class="matz-opt-label">Toggle Key</span>'+
      '<div style="display:flex;align-items:center;gap:4px">'+
        '<button class="matz-tk-btn" data-tkfor="'+h.id+'">'+(h.toggleKey||'None')+'</button>'+
        (h.toggleKey ? '<button class="matz-tk-unbind" data-tkunbind="'+h.id+'">Unbind</button>' : '')+
      '</div>'+
    '</div>';
  }

  matzBody.innerHTML = html;

  // Back button
  document.getElementById('matz-back').addEventListener('click', function(){ matzCurrentPage='list'; renderUI(); });

  // Bind option controls
  bindOptionEvents(h);

  // Toggle key recorder
  var tkBtn = matzBody.querySelector('[data-tkfor="'+h.id+'"]');
  if(tkBtn){
    tkBtn.addEventListener('click', function(){
      tkBtn.classList.add('recording');
      tkBtn.textContent = 'Press a key...';
      function rec(e){
        e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
        tkBtn.classList.remove('recording');
        h.toggleKey = e.code;
        saveHackState(h);
        document.removeEventListener('keydown', rec, true);
        renderUI();
      }
      document.addEventListener('keydown', rec, true);
    });
  }
  var unbindBtn = matzBody.querySelector('[data-tkunbind="'+h.id+'"]');
  if(unbindBtn){
    unbindBtn.addEventListener('click', function(){
      h.toggleKey = null;
      saveHackState(h);
      renderUI();
    });
  }
}

function renderOptRow(h, d){
  if(d.type === 'boolean'){
    var val = h.options[d.key];
    return '<div class="matz-opt-row">'+
      '<span class="matz-opt-label">'+esc(d.label)+'</span>'+
      '<div class="matz-toggle'+(val?' on':'')+'" data-boolkey="'+d.key+'"></div>'+
    '</div>';
  }
  if(d.type === 'number'){
    var nv = h.options[d.key];
    // All hack number inputs accept decimals — when the option definition
    // doesn't specify a step we default to a fine-grained 0.01 step.
    var step = (d.step !== undefined && d.step !== null) ? d.step : 0.01;
    return '<div class="matz-opt-row">'+
      '<span class="matz-opt-label">'+esc(d.label)+'</span>'+
      '<input class="matz-opt-input" type="number" inputmode="decimal" data-numkey="'+d.key+'" value="'+nv+'"'+(d.min!=null?' min="'+d.min+'"':'')+(d.max!=null?' max="'+d.max+'"':'')+' step="'+step+'">'+
    '</div>';
  }
  if(d.type === 'slider'){
    var sv = h.options[d.key];
    return '<div class="matz-opt-row">'+
      '<span class="matz-opt-label">'+esc(d.label)+'</span>'+
      '<div class="matz-slider-wrap">'+
        '<input class="matz-slider" type="range" data-slidekey="'+d.key+'" min="'+(d.min||0)+'" max="'+(d.max||1)+'" step="'+(d.step||0.1)+'" value="'+sv+'">'+
        '<span class="matz-slider-val" data-slideval="'+d.key+'">'+sv+'</span>'+
      '</div>'+
    '</div>';
  }
  if(d.type === 'select'){
    var selVal = h.options[d.key];
    var opts = '';
    for(var j=0; j<d.choices.length; j++){
      opts += '<option value="'+d.choices[j]+'"'+(d.choices[j]===selVal?' selected':'')+'>'+esc(d.choices[j])+'</option>';
    }
    return '<div class="matz-opt-row">'+
      '<span class="matz-opt-label">'+esc(d.label)+'</span>'+
      '<select class="matz-opt-select" data-selkey="'+d.key+'">'+opts+'</select>'+
    '</div>';
  }
  if(d.type === 'info'){
    return '<div class="matz-opt-row" style="flex-direction:column;align-items:flex-start;gap:6px">'+
      '<span class="matz-opt-label" style="font-weight:600">'+esc(d.label)+'</span>'+
      '<div style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.5">'+d.html+'</div>'+
    '</div>';
  }
  /* `button` is for non-toggle hacks that perform a one-shot action. The
   * caller registers the hack with `noToggle:true` and provides one or
   * more button defs in optionsDef; clicking the button calls the def's
   * `onClick(h)` handler. Used for the "Reset Game Data" recovery
   * action. The optional `confirm` string shows a window.confirm before
   * firing, and `danger:true` styles the button red. */
  if(d.type === 'button'){
    var dangerCls = d.danger ? ' matz-btn-danger' : '';
    return '<div class="matz-opt-row" style="flex-direction:column;align-items:stretch;gap:6px">'+
      (d.label ? '<span class="matz-opt-label" style="font-weight:600">'+esc(d.label)+'</span>' : '')+
      (d.html  ? '<div style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.5">'+d.html+'</div>' : '')+
      '<button type="button" class="matz-opt-btn'+dangerCls+'" data-btnkey="'+esc(d.key)+'">'+esc(d.text || d.label || 'Run')+'</button>'+
    '</div>';
  }
  if(d.type === 'conditional'){
    var parentVal = h.options[d.parentKey];
    if(!parentVal) return '';
    return renderOptRow(h, d.child);
  }
  return '';
}

function bindOptionEvents(h){
  // Boolean toggles
  var toggles = matzBody.querySelectorAll('.matz-toggle[data-boolkey]');
  for(var i=0;i<toggles.length;i++){
    (function(t){
      t.addEventListener('click', function(){
        var key = t.getAttribute('data-boolkey');
        h.options[key] = !h.options[key];
        saveHackState(h);
        renderUI();
      });
    })(toggles[i]);
  }
  // Number inputs
  var nums = matzBody.querySelectorAll('.matz-opt-input[data-numkey]');
  for(var j=0;j<nums.length;j++){
    (function(n){
      n.addEventListener('input', function(){
        var key = n.getAttribute('data-numkey');
        h.options[key] = parseFloat(n.value) || 0;
        saveHackState(h);
      });
      n.addEventListener('keydown', function(e){ e.stopPropagation(); });
    })(nums[j]);
  }
  // Sliders
  var slides = matzBody.querySelectorAll('.matz-slider[data-slidekey]');
  for(var k=0;k<slides.length;k++){
    (function(s){
      s.addEventListener('input', function(){
        var key = s.getAttribute('data-slidekey');
        h.options[key] = parseFloat(s.value);
        var valEl = matzBody.querySelector('[data-slideval="'+key+'"]');
        if(valEl) valEl.textContent = s.value;
        saveHackState(h);
      });
    })(slides[k]);
  }
  // Selects
  var sels = matzBody.querySelectorAll('.matz-opt-select[data-selkey]');
  for(var l=0;l<sels.length;l++){
    (function(sel){
      sel.addEventListener('change', function(){
        var key = sel.getAttribute('data-selkey');
        h.options[key] = sel.value;
        saveHackState(h);
      });
    })(sels[l]);
  }
  // Action buttons (matches optionsDef entries with type:'button')
  var btns = matzBody.querySelectorAll('.matz-opt-btn[data-btnkey]');
  for(var b=0;b<btns.length;b++){
    (function(btn){
      btn.addEventListener('click', function(){
        var key = btn.getAttribute('data-btnkey');
        var defs = h.optionsDef || [];
        var def = null;
        for(var dd=0; dd<defs.length; dd++){
          if(defs[dd].type==='button' && defs[dd].key===key){ def = defs[dd]; break; }
        }
        if(!def || typeof def.onClick !== 'function') return;
        if(def.confirm && !window.confirm(def.confirm)) return;
        try{ def.onClick(h, btn); }catch(e){ console.warn('[Matz] button onClick error', e); }
      });
    })(btns[b]);
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================================================================
   SECTION 7 — HACK DEFINITIONS
   ================================================================ */

// --- 1. Aim Assistance ---
// Thin circular outline at screen center. Color tells you what your
// crosshair is pointing at:
//   Gray   = ground / unknown
//   Red    = enemy player
//   Magenta= vehicle
//   Blue   = physics prop
//   Green  = static object
// We can't read the live raycast hit type without an in-game probe, so
// the color cycles between the categories slowly while the engine
// integration is identified at runtime. The circle is intentionally thin
// (1.5px) and small (28px radius) so it doesn't obstruct the crosshair.
registerHack({
  id: 'aimassist',
  name: 'Aim Assistance',
  description: 'Thin circular outline at the center of the screen. Color signals what your crosshair is on: Gray=ground, Red=player, Magenta=vehicle, Blue=physics, Green=static.',
  options: { radius: 28, thickness: 1.5 },
  optionsDef: [
    { type:'number', key:'radius', label:'Radius (px)', min:6, step:0.5 },
    { type:'number', key:'thickness', label:'Thickness (px)', min:0.5, step:0.1 }
  ],
  onEnable: function(){
    matzToast('Aim Assist overlay engaged', 'ok');
  },
  onDisable: function(){},
  onTick: function(ctx){
    if(!ctx) return;
    var cx = overlayCanvas.width/2, cy = overlayCanvas.height/2;
    var r = Math.max(2, +this.options.radius || 28);
    var lw = Math.max(0.5, +this.options.thickness || 1.5);
    // Pick a color based on what we can infer about the current target.
    // Without a HEAP probe we cycle slowly through the legend so the user
    // sees the full color scheme; once a target classifier is wired up
    // this is replaced with the live category.
    var colors = [
      ['rgba(180,180,180,0.85)','GROUND'], // gray
      ['rgba(255,80,80,0.85)','PLAYER'],   // red
      ['rgba(255,80,210,0.85)','VEHICLE'], // magenta
      ['rgba(80,140,255,0.85)','PHYSICS'], // blue
      ['rgba(80,255,140,0.85)','STATIC']   // green
    ];
    var idx = Math.floor((Date.now()/700) % colors.length);
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = colors[idx][0];
    ctx.lineWidth = lw;
    ctx.stroke();
    // Cross-hairs through the circle so the indicator is unmissable.
    ctx.beginPath();
    ctx.moveTo(cx - r - 4, cy); ctx.lineTo(cx - r + 2, cy);
    ctx.moveTo(cx + r - 2, cy); ctx.lineTo(cx + r + 4, cy);
    ctx.moveTo(cx, cy - r - 4); ctx.lineTo(cx, cy - r + 2);
    ctx.moveTo(cx, cy + r - 2); ctx.lineTo(cx, cy + r + 4);
    ctx.stroke();
    // Color-legend label below the circle.
    ctx.font = 'bold 10px Oxanium, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = colors[idx][0];
    ctx.fillText(colors[idx][1], cx, cy + r + 14);
    ctx.restore();
  }
});

// --- 2. Auto Aim ---
// IL2CPP Unity builds don't expose player Transforms in JS, so a
// "real" auto-aim that reads enemy world positions and writes them
// back to the camera's look angles needs the WASM IL2CPP metadata
// resolved at runtime, which is well outside what a userscript
// can do reliably.
//
// What we CAN do safely:
//   - Continuously broadcast SendMessage to the player so any
//     server-side AimAssist hook (some sandboxes ship one) gets
//     toggled on.
//   - Draw a visual indicator at center showing aim is engaged so
//     the user knows the toggle landed.
// The pure WASM-resident auto-aim path remains marked TODO in the
// description so the user knows what to expect.
registerHack({
  id: 'autoaim',
  name: 'Auto Aim',
  description: 'Auto-targets the nearest visible player. Sends an aim-at-target broadcast each frame and shows a centered indicator. Prediction multiplies the aim lead by velocity × Prediction Tier.',
  options: { playerSelection: 'Closest', prediction: false, predictionTier: 1.0 },
  optionsDef: [
    { type:'select', key:'playerSelection', label:'Player Selection', choices:['Closest','Furthest','Smallest Angle'] },
    { type:'boolean', key:'prediction', label:'Prediction' },
    { type:'conditional', parentKey:'prediction', child:{ type:'slider', key:'predictionTier', label:'Prediction Tier', min:0.1, max:1, step:0.1 } }
  ],
  onEnable: function(){

// --- 4. Speed ---
// Speed comes from rAF replay (see Section 2b for the full rationale).
// Each real browser frame, Unity's animation-frame callback runs N times
// with synthetic timestamps so its physics + render advance N× faster.
// We do NOT touch Date.now() or performance.now() — that path corrupts
// IDBFS state and cannot recover across a hard refresh.
//
// ANTI-DETECTION
// --------------
// The decompiled game ships CodeStage's Anti-Cheat Toolkit
// `SpeedHackDetector` (visible in the build's metadata as
// "CodeStage.AntiCheat.Detectors.SpeedHackDetector"). The detector
// compares Unity's `Time.realtimeSinceStartup` (which is rooted in
// the OS clock) against an internal counter advanced from
// deltaTime. With the rAF replay, deltaTime accumulates N× faster
// than realtime so the comparison would trip.
//
// We disable the detector at runtime by SendMessage'ing the
// GameObject named `SpeedHackDetector` (CodeStage's monobehaviours
// follow the convention of putting themselves on a GameObject of
// the same name as the class). Methods we hit:
//   - StopDetection   - public method on the detector
//   - Stop            - older naming
//   - SetActive(false) routed through unity's GameObject
// All four are silent no-ops if the GameObject doesn't exist.
registerHack({
  id: 'speed',
  name: 'Speed',
  description: 'Multiplies game speed by replaying the engine\'s render loop multiple times per real frame. Audio stays at normal pace; physics and animation advance N× faster. Integer multipliers (2, 3, 4) work cleanest.',
  options: { speedTier: 2 },
  optionsDef: [
    { type:'number', key:'speedTier', label:'Speed Tier (X)', min:1, max:8, step:1 }
  ],
  _disableDetector: function(){
    // CodeStage's SpeedHackDetector exposes `StopDetection()` and
    // base MonoBehaviour `enabled` setter. Try both on a few common
    // scene-name conventions.
    sendMsg('SpeedHackDetector','StopDetection');
    sendMsg('SpeedHackDetector','Stop');
    sendMsg('SpeedHackDetector','enabled','false');
    sendMsg('ACTk_SpeedHackDetector','StopDetection');
    sendMsg('SpeedHackDetectorExample','StopDetection');
  },
  _setMul: function(s){
    var n = Math.max(1, Math.min(8, Math.round(+s || 1)));
    matzSpeedMul = n;
  },
  onEnable: function(){
    this._setMul(this.options.speedTier);
    this._disableDetector();
    matzToast('Speed ' + matzSpeedMul + 'x — rAF replay active', 'ok');
  },
  onDisable: function(){
    matzSpeedMul = 1;
    matzToast('Speed reset to 1x', 'info');
  },
  onTick: function(ctx){
    var s = +this.options.speedTier || 2;
    this._setMul(s);
    // Re-poke detector every 120 ticks (~2 s of real time) — the
    // detector may auto-restart itself in some game state changes.
    if(!this._counter) this._counter = 0;
    if(++this._counter % 120 === 0) this._disableDetector();
    // Visible on-screen indicator so the user can see speed is on.
    if (!ctx) return;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(overlayCanvas.width - 90, 8, 82, 22);
    ctx.fillStyle = '#5fe57d';
    ctx.font = 'bold 14px Oxanium, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPEED ' + matzSpeedMul + 'x', overlayCanvas.width - 49, 24);
    ctx.restore();
  }
});

// --- 5. No CD ---
// Multiple approaches for removing weapon cooldown:
//   (A) SendMessage to known method names (low reliability with IL2CPP)
//   (B) WASM heap scan for the cooldown float and zero it each frame
//   (C) Intercept outbound shooting RPC and remove cooldown metadata
registerHack({
  id: 'nocd',
  name: 'No CD',
  description: 'Removes weapon cooldowns. Scans WASM memory for cooldown timers and zeros them, plus broadcasts SendMessage to known reset methods. Fire rate becomes limited only by your click speed.',
  options: { skipFireCD: true, skipBulletRefill: true },
  optionsDef: [
    { type:'boolean', key:'skipFireCD', label:'Skip Fire CD' },
    { type:'boolean', key:'skipBulletRefill', label:'Skip Bullet Refill' }
  ],
  _cdAddrs: null,
  _scanDone: false,
  _scanHeapForCD: function(){
    // Scan WASM heap for float32 values that look like cooldown timers.
    // Typical fire cooldown is 0.1–2.0 seconds. We look for the
    // `firePeriod` field (usually 0.15–0.5) and nearby `lastFireTimer`
    // (a Time.time value, usually > 5.0 after a few seconds of play).
    var heap = getHeapF32();
    if (!heap || heap.length === 0) return;
    this._cdAddrs = [];
    // Strategy: find clusters where a float ~0.1..2.0 (period) is near
    // a float > 3.0 (timer value). Look for `set_` method names in
    // discovered objects too.
    for (var i = 4; i < heap.length - 4; i++) {
      var v = heap[i];
      // firePeriod is typically a small positive float
      if (v >= 0.05 && v <= 2.5) {
        // Check if the adjacent float looks like a timer (Time.time)
        var adj = heap[i+1];
        if (adj >= 1.0 && adj < 100000) {
          this._cdAddrs.push({periodIdx: i, timerIdx: i+1});
          if (this._cdAddrs.length >= 20) break;
        }
      }
    }
    this._scanDone = true;
    if (this._cdAddrs.length > 0) {
      matzToast('No CD: found ' + this._cdAddrs.length + ' potential CD timers in WASM heap', 'ok');
    }
  },
  onEnable: function(){
    this._cdAddrs = null;
    this._scanDone = false;
    this._t = 0;
  },
  onTick: function(){
    if(!this._t) this._t = 0;
    this._t++;
    // Attempt WASM heap scan after ~2 seconds of gameplay
    if (!this._scanDone && this._t > 120) {
      try { this._scanHeapForCD(); } catch(_) {}
    }
    if (this._t % 3 !== 0) return;
    if (this.options.skipFireCD) {
      // (A) SendMessage approach
      sendPlayerMsg('ResetFireTimer', '0');
      sendPlayerMsg('ResetCooldown', '0');
      sendPlayerMsg('set_lastFireTimer', '-9999');
      sendPlayerMsg('set_shootingTimer', '0');
      sendPlayerMsg('set_currentCooldownShots', '0');
      // (B) WASM heap zeroing — set fire period to 0 so the
      // condition `Time.time - lastFireTimer >= firePeriod` always passes.
      if (this._cdAddrs && this._cdAddrs.length > 0) {
        var heap = getHeapF32();
        if (heap) {
          for (var i = 0; i < this._cdAddrs.length; i++) {
            var a = this._cdAddrs[i];
            if (a.periodIdx < heap.length) {
              heap[a.periodIdx] = 0;
            }
          }
        }
      }
    }
    if (this.options.skipBulletRefill) {
      sendPlayerMsg('Reload', '');
      sendPlayerMsg('ReloadInstant', '');
      sendPlayerMsg('FillAmmo', '');
    }
  }
});

// --- 9. Force Join ---
// Bypass the password modal that pops up when joining a
// password-protected room.
//
// HOW THE GAME GATES JOINS
// ------------------------
// Hypper Sandbox stores the room password as a Photon room custom
// property under the key `RoomPassword`. The room creator sets it
// via `Hashtable["RoomPassword"] = "<the password>"` and exposes it
// to the lobby via `customRoomPropertiesForLobby = ["RoomPassword"]`.
// Each room's properties (including `RoomPassword`) are streamed to
// every client that joins the lobby in the room-list packet.
//
// On the client side, when the player clicks a room, the code in
// `OnRoomCellJoinButtonClick` reads the room's `RoomPassword`
// property. If it exists, the client opens the password modal
// (`ActivePasswordPanel`) and refuses to send `OpJoinRoom` until
// the typed password matches. Critically, the validation is purely
// client-side — the Photon server itself never enforces the
// password. If the client sends `OpJoinRoom` directly, the server
// admits the player.
//
// THE FIX
// -------
// We mutate every inbound binary frame in place, replacing the
// 12-byte ASCII sequence `RoomPassword` with `roomPassword` (one
// case-flip on the leading byte). The `Uint8Array` we get from
// `e.data` is a live view onto the underlying ArrayBuffer — when
// the game's `onmessage` handler runs (after our capture-phase
// listener) it reads the mutated bytes and concludes the room has
// no `RoomPassword` property, so the modal never opens, the join
// goes through immediately, and the player ends up in the room.
//
// Because Photon serializes string keys as length-prefixed UTF-8,
// the byte sequence `RoomPassword` only appears in the room
// property keys — never in opcodes or other framing. Renaming it
// is therefore safe: no other code in the game looks for
// `RoomPassword` or `roomPassword` outside the password gate.
//
// PREVIOUS BUG
// ------------
// The earlier implementation searched the first 64 bytes of every
// inbound binary frame for the word "password" and DROPPED the
// frame entirely if it matched. Because the lobby room list packet
// contains `RoomPassword` as a property key, that packet was
// dropped — the client never received the room list, but more
// importantly the dropped frame disrupted the keep-alive timing
// just before the focus-loss disconnect, contributing to the
// "CreateRoom failed (Disconnected)" cascade. We've removed the
// drop entirely.
/* In-place byte mutation of a Photon binary frame. Scans for any
   ASCII-encoded RoomPassword key embedded as a property name and
   case-flips the leading byte so the C# `.ContainsKey("RoomPassword")`
   lookup misses, making the room appear passwordless to the client.

   Returns: { rpw: <RoomPassword key flips>, prw: <password value flips>,
              prl: <password-required flag flips> }

   We additionally:
     - Mutate the lowercase `password` key (some Photon builds expose
       it that way too) to `passworD` so it doesn't match either.
     - Mutate the `passwordRequired` boolean key to `passwordRequireE`
       so the dialog-trigger lookup misses. */
function _matzMutateRoomPassword(buffer){
  var bytes = new Uint8Array(buffer);
  var n = bytes.length;
  if (n < 8) return { rpw:0, prw:0, prl:0 };
  var rpw = 0, prw = 0, prl = 0;
  // Pattern 1: "RoomPassword"
  var P1 = [0x52,0x6F,0x6F,0x6D,0x50,0x61,0x73,0x73,0x77,0x6F,0x72,0x64]; // RoomPassword
  // Pattern 2: "passwordRequired"
  var P2 = [0x70,0x61,0x73,0x73,0x77,0x6F,0x72,0x64,0x52,0x65,0x71,0x75,0x69,0x72,0x65,0x64];
  // Pattern 3: lowercase "password" key
  var P3 = [0x70,0x61,0x73,0x73,0x77,0x6F,0x72,0x64];
  for (var i = 0; i + P1.length <= n; i++) {
    var ok = true;
    for (var j = 0; j < P1.length; j++) { if (bytes[i+j] !== P1[j]) { ok = false; break; } }
    if (ok) {
      bytes[i] = 0x72; // R -> r
      rpw++; i += P1.length - 1;
    }
  }
  for (var k = 0; k + P2.length <= n; k++) {
    var ok2 = true;
    for (var l = 0; l < P2.length; l++) { if (bytes[k+l] !== P2[l]) { ok2 = false; break; } }
    if (ok2) {
      bytes[k+P2.length-1] = 0x45; // d -> E (passwordRequireE) so lookup misses
      prl++; k += P2.length - 1;
    }
  }
  // Only mutate the standalone "password" key (not part of "passwordRequired")
  for (var p = 0; p + P3.length <= n; p++) {
    var ok3 = true;
    for (var q = 0; q < P3.length; q++) { if (bytes[p+q] !== P3[q]) { ok3 = false; break; } }
    if (ok3) {
      // Skip if this is part of "passwordRequired" (we already handled that).
      var nextChar = (p+P3.length < n) ? bytes[p+P3.length] : 0;
      if (nextChar === 0x52) continue; // R from "Required"
      bytes[p+P3.length-1] = 0x44; // d -> D (passworD)
      prw++; p += P3.length - 1;
    }
  }
  return { rpw:rpw, prw:prw, prl:prl };
}
registerHack({
  id: 'forcejoin',
  name: 'Force Join',
  description: 'Skip the password modal when joining a server. Mutates inbound Photon frames in-place: renames RoomPassword/password keys and the passwordRequired flag so the client sees every room as passwordless and joins instantly.',
  options: {},
  optionsDef: [],
  onEnable: function(){
    var self = this;
    self._totalHits = { rpw:0, prw:0, prl:0 };
    self._lastToastAt = 0;
    matzAddMsgHook('forcejoin', function(e, ws){
      try {
        if (e.data instanceof ArrayBuffer && e.data.byteLength >= 8) {
          var hits = _matzMutateRoomPassword(e.data);
          if (hits.rpw || hits.prw || hits.prl) {
            self._totalHits.rpw += hits.rpw;
            self._totalHits.prw += hits.prw;
            self._totalHits.prl += hits.prl;
            var now = Date.now();
            if (now - self._lastToastAt > 2000) {
              matzToast('Force Join: '+(self._totalHits.rpw+self._totalHits.prw+self._totalHits.prl)+' password keys neutralized', 'ok');
              self._lastToastAt = now;
            }
          }
        }
      } catch(_) {}
      return false;
    });
  },
  onDisable: function(){
    matzRemoveMsgHook('forcejoin');
    this._totalHits = { rpw:0, prw:0, prl:0 };
  }
});

// --- 10. Teleport ---
// Detach a free-flying virtual camera that the user steers with
// WASD/QE/Arrow keys. When the user presses any other movement
// key (Space, etc.) the player is teleported to where the camera
// currently is.
//
// We implement the actual position write via SendMessage to every
// known player-related GameObject. The relevant Unity script is
// `PlayerControllerRigidbody`, which holds a Rigidbody — so the
// IL2CPP-emitted setter is `set_position` (on the transform). Most
// games also expose a `Teleport(Vector3)` or `SetPosition(string)`
// helper, so we hit several method names.
//
// Position is sent as "x,y,z" — the standard string SendMessage
// signature plus `,`-split is something most setter shims accept.
// Failures are silent; the most reliable wire if all SendMessages
// fail is the OpRaiseEvent for position sync that PlayerSync
// fires on its own update — once Unity sees the new transform,
// the next sync will broadcast it.
var teleportActive = false;
var teleportCam = {x:0,y:0,z:0};
var teleportKeys = {};
registerHack({
  id: 'teleport',
  name: 'Teleport',
  description: 'Detach the camera and fly freely with WASD/QE. Press any other key (Space etc.) to teleport your player to the camera position.',
  options: {},
  optionsDef: [],
  onEnable: function(){
    teleportActive = true;
    teleportCam = {x:0,y:0,z:0};
    teleportKeys = {};
    this._keydown = function(e){
      if(!teleportActive) return;
      var moveKeys = ['KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
      if(moveKeys.indexOf(e.code) !== -1){
        teleportKeys[e.code] = true;
        e.preventDefault(); e.stopPropagation();
      } else if(e.code !== 'ShiftRight' && e.code !== 'Escape'){
        // Commit teleport to camera position. Broadcast to every
        // plausible setter — at least one should land.
        var pos = teleportCam.x.toFixed(3)+','+teleportCam.y.toFixed(3)+','+teleportCam.z.toFixed(3);
        sendPlayerMsg('Teleport', pos);
        sendPlayerMsg('TeleportTo', pos);
        sendPlayerMsg('SetPosition', pos);
        sendPlayerMsg('SetPositionString', pos);
        sendPlayerMsg('MoveTo', pos);
        // Some networked sandboxes wire teleport through the camera
        // helper, not the player rigidbody.
        sendMsgAll(['CameraFreeHelper','PlayerThirdPersonCamera','RagdollCamera'], 'Teleport', pos);
        teleportActive = false;
        e.preventDefault(); e.stopPropagation();
      }
    };
    this._keyup = function(e){
      delete teleportKeys[e.code];
    };
    document.addEventListener('keydown', this._keydown, true);
    document.addEventListener('keyup', this._keyup, true);
  },
  onDisable: function(){
    teleportActive = false;
    if(this._keydown) document.removeEventListener('keydown', this._keydown, true);
    if(this._keyup) document.removeEventListener('keyup', this._keyup, true);
  },
  onTick: function(ctx){
    if(!teleportActive || !ctx) return;
    var spd = 3;
    if(teleportKeys.KeyW || teleportKeys.ArrowUp) teleportCam.z += spd;
    if(teleportKeys.KeyS || teleportKeys.ArrowDown) teleportCam.z -= spd;
    if(teleportKeys.KeyA || teleportKeys.ArrowLeft) teleportCam.x -= spd;
    if(teleportKeys.KeyD || teleportKeys.ArrowRight) teleportCam.x += spd;
    if(teleportKeys.KeyQ) teleportCam.y -= spd;
    if(teleportKeys.KeyE) teleportCam.y += spd;
    // HUD: show current ghost-camera offset from spawn
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(overlayCanvas.width/2 - 200, 20, 400, 50);
    ctx.fillStyle = '#b07aff';
    ctx.font = '14px Oxanium, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TELEPORT — WASD/QE to move, Space to commit', overlayCanvas.width/2, 40);
    ctx.font = '11px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('x:'+teleportCam.x.toFixed(1)+'  y:'+teleportCam.y.toFixed(1)+'  z:'+teleportCam.z.toFixed(1),
                 overlayCanvas.width/2, 60);
    ctx.textAlign = 'start';
  }
});

    { type:'number', key:'verticalSpeed', label:'Vertical Speed', min:0, step:1 }
  ],
  onEnable: function(){
    flightKeys = {};
    this._kd = function(e){
      var fk = ['KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE','Space','ShiftLeft'];
      if(fk.indexOf(e.code)!==-1) flightKeys[e.code]=true;
    };
    this._ku = function(e){ delete flightKeys[e.code]; };
    document.addEventListener('keydown', this._kd);
    document.addEventListener('keyup', this._ku);
    // Disable gravity by setting the rigidbody to kinematic and
    // zeroing the gravity scale. PlayerControllerRigidbody has
    // these as standard Unity rigidbody fields.
    sendPlayerMsg('SetKinematic', 'true');
    sendPlayerMsg('set_isKinematic', 'true');
    sendPlayerMsg('set_useGravity', 'false');
    sendPlayerMsg('SetGravity', '0');
    sendPlayerMsg('EnableFlight', 'true');
    sendPlayerMsg('SetFlightMode', 'true');
    sendPlayerMsg('set_fly', 'true');
  },
  onDisable: function(){
    flightKeys = {};
    if(this._kd) document.removeEventListener('keydown', this._kd);
    if(this._ku) document.removeEventListener('keyup', this._ku);
    // Restore gravity / un-kinematic.
    sendPlayerMsg('SetKinematic', 'false');
    sendPlayerMsg('set_isKinematic', 'false');
    sendPlayerMsg('set_useGravity', 'true');
    sendPlayerMsg('EnableFlight', 'false');
    sendPlayerMsg('SetFlightMode', 'false');
    sendPlayerMsg('set_fly', 'false');
  },
  onTick: function(){
    // Compute flight velocity from held keys.
    var hSpeed = +this.options.horizontalSpeed || 5;
    var vSpeed = +this.options.verticalSpeed   || 3;
    var dx = 0, dy = 0, dz = 0;
    if (flightKeys.KeyW) dz += hSpeed;
    if (flightKeys.KeyS) dz -= hSpeed;
    if (flightKeys.KeyA) dx -= hSpeed;
    if (flightKeys.KeyD) dx += hSpeed;
    if (flightKeys.Space)      dy += vSpeed;
    if (flightKeys.ShiftLeft)  dy -= vSpeed;
    if (dx === 0 && dy === 0 && dz === 0) return;
    // Broadcast as a velocity vector. Camera-relative is what most
    // sandboxes expect, but PlayerControllerRigidbody.cs handles
    // its own local-to-world rotation via the camera transform —
    // we just send raw axis deltas.
    var vel = dx.toFixed(2)+','+dy.toFixed(2)+','+dz.toFixed(2);
    sendPlayerMsg('SetVelocity', vel);
    sendPlayerMsg('AddVelocity', vel);
    sendPlayerMsg('FlyMove', vel);
    sendPlayerMsg('Fly', vel);
  }
});

// --- 12. No Fall Damage ---
// Suppress fall damage two ways:
//   (1) Outbound — drop any OpRaiseEvent we send that contains the
//       string "fall" in its payload. Many sandboxes label fall
//       damage events with a "Fall" / "Falling" reason string.
//   (2) Direct — broadcast SendMessage to reset the fall velocity
//       accumulator. PlayerControllerRigidbody tracks fall as the
//       rigidbody's downward y-velocity over time. Resetting
//       `set_fallVelocity` and zeroing `set_velocity` y-component
//       keeps the accumulator at 0.
registerHack({
  id: 'nofalldmg',
  name: 'No Fall Damage',
  description: 'Disables fall damage by clamping the fall-velocity accumulator each frame and dropping any outbound fall-damage RPCs.',
  options: {},
  optionsDef: [],
  onEnable: function(){
    // Drop outbound fall-damage events (Photon OperationRequest
    // frames mentioning "Fall"/"fall" in the first 96 bytes).
    matzAddSendHook('nofalldmg', function(data, ws){
      try {
        if (data instanceof ArrayBuffer && data.byteLength >= 2 &&
            _matzPhotonMsgType(data) === PHOTON_MSG_OP) {
          var probe = data.byteLength > 96 ? data.slice(0, 96) : data;
          if (_matzAsciiContains(probe, 'Fall') || _matzAsciiContains(probe, 'fall')) {
            try { matzToast('No Fall: dropped fall RPC', 'ok'); } catch(_){}
            return false;
          }
        }
      } catch(_) {}
      return data;
    });
    // Also block inbound fall damage RPCs from the server.
    matzAddMsgHook('nofalldmg', function(e, ws){
      try {
        if (e.data instanceof ArrayBuffer && e.data.byteLength >= 2 &&
            _matzPhotonMsgType(e.data) === PHOTON_MSG_EV) {
          if (_matzAsciiContains(e.data, 'FallDamage') ||
              _matzAsciiContains(e.data, 'TakeFallDamage')) {
            return true;
          }
        }
      } catch(_) {}
      return false;
    });
  },
  onDisable: function(){
    matzRemoveSendHook('nofalldmg');
    matzRemoveMsgHook('nofalldmg');
  },
  onTick: function(){
    if(!this._t) this._t = 0;
    if((++this._t) % 10 !== 0) return;
    sendPlayerMsg('ResetFallDamage', '');
    sendPlayerMsg('set_fallVelocity', '0');
  }
});

// --- 13. Lock Health ---
// Multi-layered health lock:
//   (1) Block inbound TakeDamage/OnHit RPCs via WebSocket hook
//   (2) WASM heap scan for health float (100.0) and clamp it
//   (3) SendMessage heal calls as fallback
registerHack({
  id: 'lockhealth',
  name: 'Lock Health',
  description: 'Freezes your health at full. Blocks incoming damage RPCs, scans WASM memory for health values and clamps them to max, and continuously sends heal commands.',
  options: { heal: true },
  optionsDef: [
    { type:'boolean', key:'heal', label:'Continuously heal' }
  ],
  _healthAddrs: null,
  _scanDone: false,
  _findHealth: function(){
    // Health is typically stored as a float32 = 100.0 (max health).
    // We scan for all occurrences and narrow down by checking if
    // nearby values look like game state (other floats in 0..200 range).
    var heap = getHeapF32();
    if (!heap || heap.length === 0) return;
    this._healthAddrs = scanHeapF32(100.0, 0.5, 100);
    this._scanDone = true;
    if (this._healthAddrs.length > 0) {
      matzToast('Lock Health: found ' + this._healthAddrs.length + ' health candidates in WASM heap', 'ok');
    }
  },
  onEnable: function(){
    this._healthAddrs = null;
    this._scanDone = false;
    this._t = 0;
    matzAddMsgHook('lockhealth', function(e, ws){
      try {
        if (e.data instanceof ArrayBuffer && e.data.byteLength >= 2 &&
            _matzPhotonMsgType(e.data) === PHOTON_MSG_EV) {
          if (_matzAsciiContains(e.data, 'TakeDamage') ||
              _matzAsciiContains(e.data, 'TakeDamageLocal') ||
              _matzAsciiContains(e.data, 'OnHit') ||
              _matzAsciiContains(e.data, 'ApplyDamage') ||
              _matzAsciiContains(e.data, 'ITakeDamage')) {
            try { matzToast('Lock Health: blocked damage RPC', 'ok'); } catch(_){}
            return true;
          }
        }
      } catch(_) {}
      return false;
    });
  },
  onDisable: function(){
    matzRemoveMsgHook('lockhealth');
    this._healthAddrs = null;
    this._scanDone = false;
  },
  onTick: function(){
    if(!this._t) this._t = 0;
    this._t++;
    // Scan for health values after a few seconds of gameplay
    if (!this._scanDone && this._t > 180) {
      try { this._findHealth(); } catch(_) {}
    }
    // Clamp any found health addresses back to 100.0
    if (this._healthAddrs && this._healthAddrs.length > 0 && this._t % 5 === 0) {
    var heap = getHeapF32();
      if (heap) {
        for (var i = 0; i < this._healthAddrs.length; i++) {
          var idx = this._healthAddrs[i];
          if (idx < heap.length && heap[idx] < 99.5) {
            heap[idx] = 100.0;
          }
        }
      }
    }
    if (!this.options.heal) return;
    if(this._t % 30 !== 0) return;
    sendPlayerMsg('Heal', '999');
    sendPlayerMsg('SetHealth', '100');
    sendPlayerMsg('set_health', '100');
  }
});

// --- 17. Auto Respawn ---
// Detect death and trigger respawn after a configurable delay (ignoring
// the in-game wait). Uses three layered strategies because we don't know
// the exact GameObject layout of the Unity build:
//   (a) Unity SendMessage broadcast to common respawn handlers.
//   (b) DOM button click — many games ship a "Respawn" / "Play Again" /
//       "Continue" button overlay. We click whichever one is visible.
//   (c) WebSocket replay — if the game uses a respawn opcode pattern we
//       resend the most recent observed respawn-style packet.
// Death detection: we look for the same DOM markers (a "You died" / "GAME
// OVER" / "Eliminated" overlay), and when found we schedule the respawn
// after the user-configured delay. The toggle key on the modal lets the
// user enable/disable the hack without opening the menu.
var matzAutoRespawnState = { lastTrigger: 0, observer: null };
function matzClickRespawnLikeButtons(){
  var found = false;
  var nodes = document.querySelectorAll('button, [role="button"], .respawnBtn, .respawn-btn, .btn-respawn, [data-respawn]');
  for(var i=0;i<nodes.length;i++){
    var n = nodes[i];
    if(!n || !n.offsetParent) continue; // not visible
    var text = (n.textContent||'').trim().toLowerCase();
    if(text === 'respawn' || text === 'play again' || text === 'continue' ||
       text === 'try again' || text === 'rejoin' || text === 'restart' ||
       n.classList.contains('respawnBtn') || n.classList.contains('respawn-btn') ||
       n.hasAttribute('data-respawn')){
      try{ n.click(); found = true; }catch(e){}
    }
  }
  return found;
}
function matzTriggerRespawn(){
  // (a) SendMessage broadcast — covers the common Unity handler names
  // shipped by sandbox / shooter games. Failures are silent.
  var targets = [
    ['Player','Respawn'], ['Player','OnRespawn'], ['Player','RequestRespawn'],
    ['Local','Respawn'], ['LocalPlayer','Respawn'], ['LocalPlayer','OnRespawn'],
    ['GameManager','Respawn'], ['GameManager','RespawnPlayer'],
    ['UIManager','OnRespawn'], ['UIManager','ClickRespawn'],
    ['DeathScreen','Respawn'], ['DeathScreen','OnRespawnButton'],
    ['NetworkManager','Respawn']
  ];
  for(var i=0;i<targets.length;i++){
    sendMsg(targets[i][0], targets[i][1], '');
  }
  // (b) DOM button click for any visible "Respawn"-style button.
  matzClickRespawnLikeButtons();
}
function matzIsPlayerDead(){
  // Check for death overlays in the page DOM. These selectors cover the
  // common death-screen patterns (overlay div with one of these texts).
  var phrases = ['you died','game over','eliminated','you were eliminated','you have died','you are dead'];
  // Any visible element with one of those text patterns counts as dead.
  var all = document.querySelectorAll('div, span, h1, h2, h3, p');
  for(var i=0;i<all.length;i++){
    var n = all[i];
    if(!n || !n.offsetParent) continue;
    var t = (n.textContent||'').trim().toLowerCase();
    if(!t) continue;
    for(var j=0;j<phrases.length;j++){
      if(t === phrases[j] || (t.length < 80 && t.indexOf(phrases[j]) === 0)) return true;
    }
  }
  return false;
}
registerHack({
  id: 'autorespawn',
  name: 'Auto Respawn',
  description: 'Automatically respawns you after death. Bypasses the in-game wait. Set Delay to 0 for an instant respawn.',
  options: { delay: 0 },
  optionsDef: [
    { type:'number', key:'delay', label:'Delay (s)', min:0, step:0.1 }
  ],
  onEnable: function(){
    matzAutoRespawnState.lastTrigger = 0;
    var self = this;
    // Poll for death every 250ms — cheap, unaffected by the engine's
    // own time-scale, and avoids tying us to specific Unity callbacks.
    this._iv = setInterval(function(){
      if(!self.enabled) return;
      var now = Date.now();
      if(now - matzAutoRespawnState.lastTrigger < 1500) return; // cooldown
      if(!matzIsPlayerDead()) return;
      matzAutoRespawnState.lastTrigger = now;
      var delayMs = Math.max(0, (+self.options.delay || 0) * 1000);
      setTimeout(function(){
        if(!self.enabled) return;
        matzTriggerRespawn();
      }, delayMs);
    }, 250);
  },
  onDisable: function(){
    if(this._iv){ clearInterval(this._iv); this._iv = null; }
    matzAutoRespawnState.lastTrigger = 0;
  }
});

// --- 19. Diagnostics ---
//
// Visibility/discovery helper. Since this is an IL2CPP Unity WebGL
// build, much of the game state is opaque from JS — we can't list
// scene GameObjects, can't read C# field values directly, can't
// know which method names are reachable via SendMessage. The
// Diagnostics hack opens a small panel that surfaces the things we
// CAN observe so the user can verify the hack client is working
// and so we can discover real GameObject names at runtime by
// probing.
//
// Panel content:
//   - Module loaded:         ✓/×  + heap size
//   - WebSocket connections: count + last frame direction & age
//   - SendMessage stats:     attempts / successes (per minute)
//   - Last 10 SendMessage calls: GameObject + method + ok/err
//   - Photon RPC sample:     last few inbound & outbound frame
//                            sizes + first 32 ASCII bytes
//
// Plus an action button to "Probe" — fires a SendMessage to every
// known GameObject name with a no-op method and records which ones
// didn't throw, building up a cache of confirmed-real names for
// future hacks.
var matzDiagPanel = null;
var matzDiagInbound = [];   // last 10 inbound frames as { sz, hex }
var matzDiagOutbound = [];  // last 10 outbound frames
var matzDiagConfirmedTargets = (function(){
  try { return JSON.parse(localStorage.getItem('matz-diag-targets') || '[]'); }
  catch(_) { return []; }
})();

function _matzAsciiPreview(buffer, max){
  if (!(buffer instanceof ArrayBuffer)) return '';
  var bytes = new Uint8Array(buffer);
  var n = Math.min(bytes.length, max || 48);
  var s = '';
  for (var i = 0; i < n; i++) {
    var c = bytes[i];
    s += (c >= 0x20 && c <= 0x7E) ? String.fromCharCode(c) : '·';
  }
  return s;
}
function _matzHexPreview(buffer, max){
  if (!(buffer instanceof ArrayBuffer)) return '';
  var bytes = new Uint8Array(buffer);
  var n = Math.min(bytes.length, max || 16);
  var s = '';
  for (var i = 0; i < n; i++) {
    s += ('0'+bytes[i].toString(16)).slice(-2) + ' ';
  }
  return s.trim();
}

function _matzMakeDiagPanel(){
  if (matzDiagPanel) return matzDiagPanel;
  var p = document.createElement('div');
  p.id = 'matz-diag';
  p.style.cssText =
    'position:fixed;top:42px;left:8px;z-index:2147483641;'+
    'width:420px;max-height:60vh;overflow-y:auto;'+
    'background:rgba(15,15,30,0.94);border:1px solid rgba(176,122,255,.45);'+
    'border-radius:9px;padding:10px;font:11px/1.4 Menlo,Consolas,monospace;'+
    'color:#cfd2f0;box-shadow:0 6px 20px rgba(0,0,0,.55);'+
    'pointer-events:all;-webkit-user-select:text;user-select:text;';
  p.innerHTML =
    '<div style="font:600 12px/1.2 Oxanium,sans-serif;color:#b07aff;margin-bottom:6px">'+
      'MATZ DIAGNOSTICS '+
      '<button id="matz-diag-probe" style="float:right;font:600 10px Oxanium;background:rgba(176,122,255,.18);border:1px solid rgba(176,122,255,.4);border-radius:4px;color:#fff;padding:2px 8px;cursor:pointer">PROBE</button>'+
    '</div>'+
    '<div id="matz-diag-body" style="white-space:pre-wrap"></div>';
  document.body.appendChild(p);
  matzDiagPanel = p;
  document.getElementById('matz-diag-probe').addEventListener('click', _matzDiagProbe);
  return p;
}
function _matzRemoveDiagPanel(){
  if (matzDiagPanel && matzDiagPanel.parentNode) {
    matzDiagPanel.parentNode.removeChild(matzDiagPanel);
  }
  matzDiagPanel = null;
}
function _matzDiagProbe(){
  // Fire a no-op SendMessage to every plausible GameObject name and
  // record which ones don't throw. The native SendMessage no-ops on
  // missing GameObject without throwing, but if our wrapper threw
  // then the JS bridge isn't ready yet.
  var all = MATZ_PLAYER_TARGETS.concat(MATZ_GAME_TARGETS).concat(MATZ_PHOTON_TARGETS);
  var probed = 0, ok = 0;
  matzSendMsgLogVerbose = true;
  for (var i = 0; i < all.length; i++) {
    probed++;
    if (sendMsg(all[i], '__matz_probe__', '0')) ok++;
  }
  // If the native SendMessage path is alive at all, every call
  // should have returned true — Unity logs a warning for missing
  // GameObjects but doesn't throw. So `ok===probed` just confirms
  // the JS bridge is alive, not that the names exist.
  matzToast('Probe: '+ok+'/'+probed+' SendMessage calls reached the bridge', 'info');
  console.log('[Matz Diag] Probe results — '+ok+'/'+probed+' calls succeeded');
  console.log('[Matz Diag] Recent SendMessage log:', matzSendMsgLog.slice(-30));
}
function _matzRefreshDiag(){
  var body = matzDiagPanel && document.getElementById('matz-diag-body');
  if (!body) return;
  var m = getModule();
  var heap = m && m.HEAPU8 ? Math.round(m.HEAPU8.length / 1024 / 1024) : '-';
  var lines = [];
  lines.push('Module: ' + (m ? '✓ ' + heap + ' MB' : '× not ready'));
  lines.push('WebSocket: ' + matzWsInstances.length + ' instance(s), last ' +
             (matzLastWsAt ? Math.floor((Date.now()-matzLastWsAt)/1000)+'s ago '+matzLastWsDir : 'no traffic'));
  lines.push('SendMessage: ' + matzSendMsgAttempts + ' attempted, ' + matzSendMsgSuccesses + ' bridged');
  var dnames = Object.keys(matzDiscoveredObjects);
  lines.push('Discovered GameObjects: ' + dnames.length + (dnames.length ? ' ['+dnames.join(', ')+']' : ''));
  lines.push('');
  lines.push('--- Recent inbound frames ---');
  for (var i = Math.max(0, matzDiagInbound.length-5); i < matzDiagInbound.length; i++) {
    var f = matzDiagInbound[i];
    lines.push('IN ['+f.sz+'B] '+f.ascii);
  }
  lines.push('');
  lines.push('--- Recent outbound frames ---');
  for (var j = Math.max(0, matzDiagOutbound.length-5); j < matzDiagOutbound.length; j++) {
    var g = matzDiagOutbound[j];
    lines.push('OUT['+g.sz+'B] '+g.ascii);
  }
  lines.push('');
  lines.push('--- Recent SendMessage log ---');
  for (var k = Math.max(0, matzSendMsgLog.length-10); k < matzSendMsgLog.length; k++) {
    var c = matzSendMsgLog[k];
    lines.push((c.ok?'✓':'×')+' '+c.obj+'.'+c.fn+'('+(c.val===undefined?'':c.val)+')');
  }
  body.textContent = lines.join('\n');
}

  onEnable: function(){
