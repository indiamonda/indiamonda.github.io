          if (matzDiagOutbound.length > 10) matzDiagOutbound.shift();
        }
      } catch(_) {}
      return data;
    });
    self._diagInterval = setInterval(_matzRefreshDiag, 500);
    _matzRefreshDiag();
  },
  onDisable: function(){
    matzSendMsgLogVerbose = false;
    matzRemoveMsgHook('diagnostics');
    matzRemoveSendHook('diagnostics');
    if (this._diagInterval) { clearInterval(this._diagInterval); this._diagInterval = null; }
    _matzRemoveDiagPanel();
  }
});

// --- 20. Recovery / Reset Game Data ---
//
// Last-resort recovery for when Unity's IDBFS-backed persistent data is
// corrupt and the boot-time auto-heal in `ensureHypperIdbHealthy` either
// missed something or the corruption surfaces mid-session. Two buttons:
//
//   Heal IDB    — runs the same scan-and-repair pass that auto-runs at
//                 boot. Replaces non-Date timestamps with `new Date()`,
//                 deletes entries that can't be repaired. Game data
//                 (settings, save slots) is preserved as much as possible.
//
//   Wipe IDB    — nukes the entire `/idbfs` IndexedDB. Forces a from-
//                 scratch persistent-data state. Use only when Heal isn't
//                 enough. The page will auto-reload after the wipe so
//                 Unity can re-init cleanly.
//
// The functions both delegate to the helpers exposed on `window` by the
// boot script (`__hypperEnsureIdbHealthy` + `__hypperWipeIdb`), so this
// hack doesn't reimplement the IDB logic — single source of truth.
registerHack({
  id: 'reset_data',
  name: 'Reset Game Data',
  description: 'Recovery tools for when the game freezes or fails to load due to corrupt IndexedDB state. Try Heal first; only Wipe if Heal doesn\'t fix it. Wipe will erase all in-game saves and settings.',
  noToggle: true,
  options: {},
  optionsDef: [
    { type:'info', label:'When to use', html:
      'If the game won\'t respond after loading, or freezes after enabling a hack, the persistent-data IndexedDB is probably in a bad state. These tools clean it up so the next reload boots fresh.'
    },
    {
      type:'button',
      key:'heal',
      label:'Heal',
      text:'Heal IndexedDB',
      onClick: function(h, btn){
        btn.disabled = true;
        btn.textContent = 'Healing…';
        var fn = window.__hypperEnsureIdbHealthy;
        if(typeof fn !== 'function'){
          btn.textContent = 'Heal unavailable';
          setTimeout(function(){ btn.disabled = false; btn.textContent = 'Heal IndexedDB'; }, 1500);
          return;
        }
        fn().then(function(){
          btn.textContent = 'Healed — reload to retry';
          setTimeout(function(){ location.reload(); }, 600);
        });
      }
    },
    {
      type:'button',
      key:'wipe',
      label:'Wipe',
      text:'Wipe IndexedDB (deletes saves)',
      danger: true,
      confirm: 'This will delete ALL local Hypper Sandbox save data and settings, then reload. Continue?',
      onClick: function(h, btn){
        btn.disabled = true;
        btn.textContent = 'Wiping…';
        var fn = window.__hypperWipeIdb;
        if(typeof fn !== 'function'){
          btn.textContent = 'Wipe unavailable';
          setTimeout(function(){ btn.disabled = false; btn.textContent = 'Wipe IndexedDB (deletes saves)'; }, 1500);
          return;
        }
        fn().then(function(ok){
          btn.textContent = ok ? 'Wiped — reloading…' : 'Wipe failed (DB busy) — reloading anyway…';
          setTimeout(function(){ location.reload(); }, 600);
        });
      }
    },
    {
      type:'button',
      key:'localStorage_reset',
      label:'Reset hack settings',
      text:'Reset all MATZ hack toggles & options',
      danger: true,
      confirm: 'This clears all saved MATZ hack states (enabled flags, options, hotkeys) for Hypper Sandbox. The game itself is unaffected. Continue?',
      onClick: function(h, btn){
        btn.disabled = true;
        btn.textContent = 'Clearing…';
        try{
          var keys = [];
          for(var i=0; i<localStorage.length; i++){
            var k = localStorage.key(i);
            if(k && /^matz-(en|opt|tk)-/.test(k)) keys.push(k);
          }
          for(var j=0; j<keys.length; j++) localStorage.removeItem(keys[j]);
          btn.textContent = 'Cleared ' + keys.length + ' keys — reloading…';
        }catch(e){
          btn.textContent = 'Failed: ' + (e && e.message || 'unknown');
        }
        setTimeout(function(){ location.reload(); }, 600);
      }
    }
  ]
});

/* ================================================================
   COMMAND INTERCEPTION
   ================================================================
   Hypper Sandbox sends chat through Photon: the user types in the
   in-game ChatPanel input, the C# `ChatManager.PostMassage(text)`
   method (note the typo — that's the actual symbol in the build)
   raises a Photon event whose payload includes the chat text as
   a UTF-8 string. By the time the data hits the WebSocket it's a
   binary OperationRequest frame with the text embedded as one of
   the parameter values.

   To intercept commands the user typed in chat, we scan every
   outbound binary frame for ASCII substrings that start with `\`
   (backslash, 0x5C) and match one of our command tokens. When we
   find one, we drop the outbound frame (so the command text never
   reaches other players) and run the command's local effect.

   Commands implemented:
     \kill            — kill self by SendMessage broadcasting
                        TryDeath / KillPlayer / TakeDamageLocal
     \joinMessage     — show a fake "X joined" entry only to us
     \leaveMessage    — show a fake "X left" entry only to us
     \spam N TEXT     — send TEXT N times via the real chat path,
                        with 200ms spacing so we don't trip the
                        anti-spam rate limiter */
function _matzScanFrameForCommand(data){
  if (!(data instanceof ArrayBuffer)) return null;
  var bytes = new Uint8Array(data);
  if (bytes.length > 4096) return null; // too big to be a chat msg
  // Replace non-printable with a sentinel that's not part of any
  // command token (NUL).
  var s = '';
  for (var i = 0; i < bytes.length; i++) {
    var c = bytes[i];
    s += (c >= 0x20 && c <= 0x7E) ? String.fromCharCode(c) : '\0';
  }
  var idx = s.indexOf('\\');
  while (idx !== -1) {
    // Slice out the contiguous printable run starting at the
    // backslash (until the next non-printable sentinel).
    var end = idx;
    while (end < s.length && s.charCodeAt(end) !== 0) end++;
    var token = s.substring(idx, end);
    var tokens = ['\\kill', '\\joinMessage', '\\leaveMessage', '\\spam'];
    for (var k = 0; k < tokens.length; k++) {
      if (token.indexOf(tokens[k]) === 0) return token;
    }
    idx = s.indexOf('\\', end);
  }
  return null;
}

/* Local effect handlers for each command. */
function _matzCmdKill(){
  // Try every "kill self" RPC name the build's data archive
  // surfaces, plus generic ones. Failures silent.
  console.log('[Matz Commands] \\kill — broadcasting self-death');
  sendPlayerMsg('TryDeath', '');
  sendPlayerMsg('Die', '');
  sendPlayerMsg('Kill', '');
  sendPlayerMsg('KillSelf', '');
  sendPlayerMsg('TakeDamageLocal', '99999');
  sendPlayerMsg('TakeDamage', '99999');
  sendPlayerMsg('SetHealth', '0');
  sendPlayerMsg('set_health', '0');
  sendGameMsg('KillPlayer', '');
  sendGameMsg('TryDeath', '');
}
function _matzCmdJoinMessage(){
  console.log('[Matz Commands] \\joinMessage — injecting local-only join');
  // Inject a fake chat line that only we see. Use the local-only
  // ChatManager.ShowChatMessage path.
  var fakeName = 'Player' + Math.floor(Math.random()*9000+1000);
  var line = fakeName + ' joined';
  sendMsg('ChatManager','ShowChatMessage', line);
  sendMsg('ChatManager','HandleChatMessagesEvent', line);
  sendMsg('GUIManager','ShowChatMessage', line);
}
function _matzCmdLeaveMessage(){
  console.log('[Matz Commands] \\leaveMessage — injecting local-only leave');
  var fakeName = 'Player' + Math.floor(Math.random()*9000+1000);
  var line = fakeName + ' left';
  sendMsg('ChatManager','ShowChatMessage', line);
  sendMsg('ChatManager','HandleChatMessagesEvent', line);
  sendMsg('GUIManager','ShowChatMessage', line);
}
function _matzCmdSpam(token){
  // \spam {count} {message}
  var m = token.match(/^\\spam\s+(\d+)\s+(.+)$/);
  if (!m) return;
  var count = Math.max(1, Math.min(99, parseInt(m[1], 10)));
  var msg = m[2];
  console.log('[Matz Commands] \\spam x'+count, msg);
  for (var i = 0; i < count; i++) {
    (function(idx){
      setTimeout(function(){
        // Call the real chat path. ChatManager.PostMassage is the
        // actual method name (typo'd in the C# source).
        sendMsg('ChatManager','PostMassage', msg);
        sendMsg('ChatManager','SendChatMessage', msg);
      }, idx * 220);
          })(i);
        }
}

matzAddSendHook('commands', function(data, ws){
  try {
    if (data instanceof ArrayBuffer && data.byteLength >= 6 &&
        _matzPhotonMsgType(data) === PHOTON_MSG_OP) {
      var token = _matzScanFrameForCommand(data);
      if (token) {
        if      (token.indexOf('\\kill')         === 0) _matzCmdKill();
        else if (token.indexOf('\\joinMessage')  === 0) _matzCmdJoinMessage();
        else if (token.indexOf('\\leaveMessage') === 0) _matzCmdLeaveMessage();
        else if (token.indexOf('\\spam')         === 0) _matzCmdSpam(token);
        return false;
      }
    }
  } catch(_) {}
    return data;
});
