<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Dinosaur Game</title>
  <link rel="icon" href="../dino.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f7f7f7; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
    #game {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #instructions {
      margin-top: 12px;
      color: #535353;
      font-size: 14px;
    }
    a { color: #1a73e8; }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="150"></canvas>
  <p id="instructions">Space or tap to jump · <a href="../">← Back</a></p>
  <script>
    (function() {
      var c = document.getElementById('game');
      var ctx = c.getContext('2d');
      var scale = 1;
      function resize() {
        var w = window.innerWidth;
        var h = window.innerHeight - 60;
        scale = Math.min(w / 600, h / 150, 2);
        c.width = 600;
        c.height = 150;
        c.style.width = (600 * scale) + 'px';
        c.style.height = (150 * scale) + 'px';
      }
      window.addEventListener('resize', resize);
      resize();

      var dino = { x: 50, y: 100, vy: 0, h: 40, w: 44 };
      var groundY = 110;
      var cacti = [];
      var speed = 6;
      var score = 0;
      var playing = false;
      var over = false;

      function jump() {
        if (!playing) { playing = true; }
        if (dino.y >= groundY - dino.h && !over) {
          dino.vy = -12;
        }
      }

      document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.key === 'ArrowUp') { e.preventDefault(); jump(); }
      });
      c.addEventListener('click', jump);
      c.addEventListener('touchstart', function(e) { e.preventDefault(); jump(); }, { passive: false });

      function spawnCactus() {
        cacti.push({
          x: c.width,
          w: 20,
          h: 40 + Math.random() * 20,
          y: groundY - (40 + Math.random() * 20)
        });
      }

      var lastSpawn = 0;
      function update(now) {
        if (over) return;
        if (playing) {
          dino.vy += 0.8;
          dino.y += dino.vy;
          if (dino.y > groundY - dino.h) {
            dino.y = groundY - dino.h;
            dino.vy = 0;
          }
          speed = 6 + Math.floor(score / 100) * 0.5;
          score += 0.5;
          if (now - lastSpawn > 1200 / (speed / 6)) {
            spawnCactus();
            lastSpawn = now;
          }
          for (var i = cacti.length - 1; i >= 0; i--) {
            cacti[i].x -= speed;
            if (cacti[i].x + cacti[i].w < 0) cacti.splice(i, 1);
            else {
              var dx = Math.abs((dino.x + dino.w/2) - (cacti[i].x + cacti[i].w/2));
              var dy = Math.abs((dino.y + dino.h/2) - (cacti[i].y + cacti[i].h/2));
              if (dx < (dino.w + cacti[i].w)/2 && dy < (dino.h + cacti[i].h)/2) over = true;
            }
          }
        }
      }

      function draw() {
        ctx.fillStyle = '#f7f7f7';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#535353';
        ctx.fillRect(0, groundY, c.width, c.height - groundY);
        ctx.strokeStyle = '#535353';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, c.width, c.height);

        if (!playing && !over) {
          ctx.fillStyle = '#535353';
          ctx.font = '14px sans-serif';
          ctx.fillText('Press SPACE to start', 220, 75);
        }

        ctx.fillStyle = '#535353';
        for (var i = 0; i < cacti.length; i++) {
          var o = cacti[i];
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }

        ctx.fillStyle = '#535353';
        ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

        ctx.fillStyle = '#535353';
        ctx.font = '12px sans-serif';
        ctx.fillText('Score: ' + Math.floor(score), c.width - 80, 20);

        if (over) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(0, 0, c.width, c.height);
          ctx.fillStyle = '#535353';
          ctx.font = '18px sans-serif';
          ctx.fillText('Game Over', 240, 65);
          ctx.font = '12px sans-serif';
          ctx.fillText('Score: ' + Math.floor(score), 265, 85);
          ctx.fillText('Space to restart', 245, 105);
        }
      }

      function loop(now) {
        update(now);
        draw();
        if (over && (typeof lastKey === 'undefined' || lastKey === ' ')) {}
        requestAnimationFrame(loop);
      }
      var lastKey = '';
      document.addEventListener('keydown', function(e) {
        if (over && e.code === 'Space') { over = false; playing = false; score = 0; cacti.length = 0; dino.y = 100; dino.vy = 0; }
      });
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
